  <script>
    // Firebase 콘솔(console.firebase.google.com)에서 프로젝트 생성 후
    // 아래 값들을 실제 값으로 교체하세요.
    // 설정 방법: 앱 → 톱니바퀴 → 프로젝트 설정 → 내 앱 → SDK 설정 및 구성
    const FIREBASE_CONFIG = {
      apiKey:            "여기에_apiKey_입력",
      authDomain:        "여기에_authDomain_입력",
      databaseURL:       "여기에_databaseURL_입력",
      projectId:         "여기에_projectId_입력",
      storageBucket:     "여기에_storageBucket_입력",
      messagingSenderId: "여기에_messagingSenderId_입력",
      appId:             "여기에_appId_입력"
    };

    // 설정값이 실제 값인지 확인
    const FB_CONFIGURED = !FIREBASE_CONFIG.apiKey.includes("여기에");

    if(FB_CONFIGURED){
      try {
        firebase.initializeApp(FIREBASE_CONFIG);
        console.log("✅ Firebase 연결됨");
      } catch(e) {
        console.warn("Firebase 초기화 오류:", e);
      }
    } else {
      console.warn("⚠️ Firebase 미설정 — localStorage 모드로 실행");
    }

    // 연결 상태를 window에 노출
    window.__FB_CONFIGURED__ = FB_CONFIGURED;
  </script>

const haversine=(la1,lo1,la2,lo2)=>{
  const R=6371,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
};

const calcDone=post=>{
  if(post.category==="사내방문") return { done:(post.visits||[]).length, total:(post.visits||[]).length, pct:100 };
  const all=(post.groups||[]).flatMap(g=>(g.items||[]));
  const done=all.filter(i=>i.stage?i.stage==="회수":i.done).length;
  return { done, total:all.length, pct:all.length?Math.round(done/all.length*100):0 };
};
const checkQuality=post=>{
  if(post.category==="사내방문"||post.category==="사내출하") return { ok:true, missing:[] };
  if(!(post.groups||[]).length) return { ok:false, missing:["품목정보"] };
  const m=[];
  if(!post.client?.trim()) m.push("거래처명");
  if(!post.requester?.trim()) m.push("의뢰자");
  if(!post.urgency) m.push("긴급도");
  if(!post.packaging?.trim()) m.push("포장형태");
  const items=post.groups.flatMap(g=>g.items);
  if(items.some(i=>i.text&&!i.detail?.trim())) m.push("LOT번호");
  if(items.some(i=>i.text&&!i.loc?.zone)) m.push("완제품위치");
  return { ok:m.length===0, missing:m };
};

        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {onBack&&<button onClick={onBack} style={{background:"none",border:"none",color:C.accent,fontSize:26,cursor:"pointer",padding:0,lineHeight:1}}>‹</button>}
          <div>
            <div style={{fontSize:17,fontWeight:700,color:C.text}}>{title}</div>
            {sub&&<div style={{fontSize:11,color:C.sub,marginTop:1}}>{sub}</div>}
          </div>
        </div>
        {right}
      </div>
    </div>
  );
}

function PBar({pct,color,h=6}){
  const bgColor = pct===100
    ? "linear-gradient(90deg,"+C.done+",#00C896)"
    : "linear-gradient(90deg,"+(color||C.accent)+","+(color||C.accentL||C.accent)+")";
  return(
    <div style={{height:h,background:C.border,borderRadius:99,overflow:"hidden"}}>
      <div style={{width:pct+"%",height:"100%",borderRadius:99,transition:"width 0.4s",
        background:bgColor}}/>
    </div>
  );
}

function Card({children,style={},onClick}){
  return(
    <div onClick={onClick}
      style={{background:C.card,borderRadius:16,border:`1px solid ${C.border}`,
        boxShadow:C.shadow,overflow:"hidden",...style}}>
      {children}
    </div>
  );
}

function Btn({children,color,outline,small,style={},onClick,disabled}){
  const bg=outline?`${color||C.accent}12`:(color||C.accent);
  const fc=outline?(color||C.accent):"#fff";
  const bd=outline?`1.5px solid ${color||C.accent}`:"none";
  return(
    <button onClick={onClick} disabled={disabled}
      style={{background:disabled?C.muted:bg,color:disabled?C.dim:fc,border:disabled?"none":bd,
        borderRadius:10,padding:small?"6px 12px":"10px 16px",fontSize:small?12:14,fontWeight:700,
        cursor:disabled?"not-allowed":"pointer",userSelect:"none",WebkitTapHighlightColor:"transparent",
        transition:"all 0.15s",...style}}>
      {children}
    </button>
  );
}

function Avatar({name,color,size=36}){
  return(
    <div style={{width:size,height:size,borderRadius:"50%",flexShrink:0,
      background:color||C.accent,display:"flex",alignItems:"center",justifyContent:"center",
      fontSize:size*0.38,fontWeight:700,color:"#fff"}}>
      {name?.[0]||"?"}
    </div>
  );
}

function ImgModal({src,onClose}){
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",
      zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <img src={src} alt="" style={{maxWidth:"100%",maxHeight:"90vh",borderRadius:12,objectFit:"contain"}}/>
    </div>
  );
}

function PhotoUpBtn({onAdd,small=false}){
  const ref=useRef();
  async function handle(e){
    const urls=await Promise.all(Array.from(e.target.files).map(readFile));
    urls.forEach(u=>onAdd(u)); e.target.value="";
  }
  const sz=small?50:80;
  return(
    <>
      <input ref={ref} type="file" accept="image/*" multiple onChange={handle} style={{display:"none"}}/>
      <button onClick={()=>ref.current.click()}
        style={{width:sz,height:sz,borderRadius:10,border:`1.5px dashed ${C.border}`,
          background:C.card2,color:C.sub,fontSize:small?16:20,cursor:"pointer",flexShrink:0,
          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
        🖼️<span style={{fontSize:9,color:C.sub}}>{small?"사진":"사진추가"}</span>
      </button>
    </>
  );
}

function TransBadge({transport}){
  if(!transport||transport==="자차") return null;
  const c=TRANS_COLOR[transport]||C.dim;
  return(
    <span style={{background:`${c}18`,color:c,border:`1px solid ${c}44`,
      fontSize:10,fontWeight:800,padding:"2px 7px",borderRadius:10}}>
      {TRANS_ICON[transport]} {transport}
    </span>
  );
}

function LocBadge({loc}){
  if(!loc?.zone) return null;
  const txt=loc.zone+(loc.rack?" "+loc.rack:"")+(loc.pallet?"-"+loc.pallet:"");
  return(
    <span style={{background:`${C.loc}15`,color:C.loc,border:`1px solid ${C.loc}44`,
      fontSize:10,fontWeight:800,padding:"2px 8px",borderRadius:10}}>
      📍{txt}
    </span>
  );
}

function QBadge({post}){
  if(post.category==="사내방문") return null;
  const {ok}=checkQuality(post);
  return(
    <span style={{background:ok?(C.done+"15"):(C.danger+"10"),color:ok?C.done:C.danger,
      border:`1px solid ${ok?C.done:C.danger}44`,fontSize:10,fontWeight:800,
      padding:"2px 7px",borderRadius:10}}>
      {ok?"✓ 완전":"⚠ 정보부족"}
    </span>
  );
}

function UrgBadge({urgency}){
  if(!urgency||urgency==="일반") return null;
  const c=URG_COLOR[urgency];
  return(
    <span style={{background:`${c}15`,color:c,border:`1px solid ${c}44`,
      fontSize:10,fontWeight:800,padding:"2px 7px",borderRadius:10}}>
      {URG_ICON[urgency]} {urgency}
    </span>
  );
}

/* ── CircleBtn ── */
function CircleBtn({done,onToggle,size=42}){
  const can=!!onToggle;
  return(
    <button onClick={onToggle||undefined} disabled={!can}
      style={{width:size,height:size,borderRadius:"50%",
        border:`2.5px solid ${done?C.done:can?C.border:"#e0e0e0"}`,
        background:done?C.done:"#fff",color:done?"#fff":C.dim,
        fontSize:done?Math.round(size*0.46):13,fontWeight:900,
        cursor:can?"pointer":"default",flexShrink:0,
        display:"flex",alignItems:"center",justifyContent:"center",
        transition:"all 0.18s",userSelect:"none",WebkitTapHighlightColor:"transparent",
        boxShadow:done?`0 2px 8px ${C.done}55`:C.shadow,
        opacity:!can&&!done?0.3:1}}>
      {done?"✓":""}
    </button>

}

/* ── StageBtn ── */
function StageBtn({item,onAdvance,canEdit}){
  const s=item.stage||STAGES[0];
  const color=STAGE_COLOR[s], done=s==="회수";
  return(
    <button onClick={canEdit&&!done?onAdvance:undefined}
      style={{padding:"5px 11px",borderRadius:20,border:`1.5px solid ${color}`,
        background:done?color:`${color}12`,color:done?"#fff":color,
        fontSize:11,fontWeight:800,cursor:canEdit&&!done?"pointer":"default",
        display:"flex",alignItems:"center",gap:3,flexShrink:0,
        transition:"all 0.15s",userSelect:"none",WebkitTapHighlightColor:"transparent"}}>
      {STAGE_ICON[s]} {s}{canEdit&&!done&&<span style={{fontSize:9,opacity:.7}}>›</span>}
    </button>
  );
}

/* ── PostCard ── */
function PostCard({post,onClick}){
  const cc=CAT[post.category]||CAT["일반출하"];
  const isVisit=post.category==="사내방문";
  const {done,total,pct}=calcDone({...post,groups:post.groups||[]});
  return(
    <Card onClick={onClick} style={{marginBottom:10,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
      <div style={{height:4,background:cc.color}}/>
      <div style={{padding:"12px 14px"}}>
        <div style={{display:"flex",justifyContent:"space-between",gap:10}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:6,flexWrap:"wrap"}}>
              <span style={{background:cc.bg,color:cc.color,fontSize:11,fontWeight:800,padding:"3px 9px",borderRadius:20}}>
                {cc.icon} {post.category}
              </span>
              <UrgBadge urgency={post.urgency}/>
              {!isVisit&&<QBadge post={post}/>}
              <TransBadge transport={post.transport}/>
              <span style={{fontSize:11,color:C.sub}}>{post.date.slice(5).replace("-","/")} {post.time}</span>
            </div>
            {post.client&&<div style={{fontSize:15,fontWeight:800,color:C.text}}>{post.client}</div>}
            {!isVisit&&<div style={{fontSize:12,color:C.sub,marginTop:2}}>{post.groups.map(g=>g.region).join(" · ")}</div>}
            {post.requester&&<div style={{fontSize:11,color:C.sub,marginTop:2}}>📋 {post.requester}</div>}
          </div>
          <div style={{textAlign:"right"}}>
            {isVisit
              ?<><div style={{fontSize:26,fontWeight:900,fontFamily:"monospace",color:C.visit}}>{(post.visits||[]).length}</div><div style={{fontSize:10,color:C.sub}}>방문건</div></>
              :<><div style={{fontSize:24,fontWeight:900,fontFamily:"monospace",color:pct===100?C.done:pct>50?C.warn:C.accent}}>{pct}%</div><div style={{fontSize:11,color:C.sub}}>{done}/{total}</div></>
            }
          </div>
        </div>
        {!isVisit&&<div style={{marginTop:8}}><PBar pct={pct} color={cc.color} h={5}/></div>}
        {isVisit&&(post.visits||[]).slice(0,2).map(v=>(
          <div key={v.id} style={{fontSize:11,color:C.sub,marginTop:5}}>
            🚶 {v.visitorName}({v.dept}) · {v.items}
          </div>
        ))}
      </div>
    </Card>
  );
}

/* ══ 로그인 ══ */
function Login({members,pendingCount,onLogin,onRequest}){
  const [sel,setSel]=useState(null);
  const [pw,setPw]=useState("");
  const [pwError,setPwError]=useState(false);
  const [showPw,setShowPw]=useState(false);

  const roles=[
    {key:"admin",label:"관리자",color:C.accent,icon:"👑",users:members.filter(u=>u.role==="admin")},
    {key:"staff",label:"출하팀",color:C.general,icon:"👷",users:members.filter(u=>u.role==="staff")},
    {key:"viewer",label:"조회",color:C.done,icon:"👁️",users:members.filter(u=>u.role==="viewer")},
  ];

  function handleLogin(){
    if(!sel) return;
    if(!sel.password){ setPwError(true); return; }
    if(pw!==sel.password){ setPwError(true); return; }
    setPwError(false);
    onLogin(sel);
  }

  const hasPw = sel && !!sel.password;

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",padding:"36px 20px"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{width:76,height:76,borderRadius:24,background:"linear-gradient(145deg,"+C.accentL+","+C.accent+")",margin:"0 auto 16px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:38,boxShadow:"0 8px 24px rgba(18,89,195,0.35)"}}>🏭</div>
        <div style={{fontSize:22,fontWeight:900,color:C.text}}>지용금속 출하관리</div>
        <div style={{fontSize:13,color:C.sub,marginTop:6}}>이름 선택 → 비밀번호 입력 후 접속</div>
      </div>
      <div style={{width:"100%",maxWidth:360}}>
        {roles.map(({key,label,color,icon,users})=>{
          if(!users.length) return null;
          return(
            <div key={key} style={{marginBottom:18}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <div style={{height:1,flex:1,background:C.border}}/>
                <span style={{fontSize:11,color:C.sub,fontWeight:700}}>{icon} {label}</span>
                <div style={{height:1,flex:1,background:C.border}}/>
              </div>
              {key==="admin"
                ? users.map(u=>(
                  <Card key={u.id} onClick={()=>{setSel(sel?.id===u.id?null:u);setPw("");setPwError(false);}}
                    style={{padding:"14px 16px",cursor:"pointer",marginBottom:8,
                      border:"2px solid "+(sel?.id===u.id?color:C.border),
                      background:sel?.id===u.id?(color+"08"):C.card}}>
                    <div style={{display:"flex",alignItems:"center",gap:12}}>
                      <Avatar name={u.name} color={color} size={46}/>
                      <div style={{flex:1}}>
                        <div style={{fontSize:16,fontWeight:700,color:C.text}}>{u.name}</div>
                        <div style={{fontSize:12,color:C.sub,marginTop:2}}>
                          전체 관리 · 통계 · 운행관리
                          {pendingCount>0&&<span style={{marginLeft:8,background:C.danger,color:"#fff",fontSize:10,fontWeight:800,borderRadius:8,padding:"1px 6px"}}>대기 {pendingCount}</span>}
                        </div>
                      </div>
                      {sel?.id===u.id&&<span style={{color,fontSize:20}}>✓</span>}
                    </div>
                  </Card>
                ))
                : (
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    {users.map(u=>(
                      <Card key={u.id} onClick={()=>{setSel(sel?.id===u.id?null:u);setPw("");setPwError(false);}}
                        style={{padding:"12px 10px",cursor:"pointer",
                          border:"2px solid "+(sel?.id===u.id?color:C.border),
                          background:sel?.id===u.id?(color+"08"):C.card,
                          display:"flex",flexDirection:"column",alignItems:"center",gap:5,position:"relative"}}>
                        <Avatar name={u.name} color={color} size={36}/>
                        <div style={{textAlign:"center"}}>
                          <div style={{fontSize:13,fontWeight:700,color:C.text}}>{u.name}</div>
                          <div style={{fontSize:10,color:C.sub,marginTop:1}}>{u.dept}{u.region?` · ${u.region}`:""}</div>
                          {u.specialty&&<div style={{fontSize:9,fontWeight:700,marginTop:2,color:u.specialty==="양산"?C.yangsan:C.general}}>{u.specialty==="양산"?"🏭 양산전담":"📦 일반담당"}</div>}
                        </div>
                        {sel?.id===u.id&&<span style={{position:"absolute",top:6,right:8,color,fontSize:14,fontWeight:900}}>✓</span>}
                      </Card>
                    ))}
                  </div>
                )
              }
            </div>
          );
        })}

        {/* 비밀번호 입력 영역 */}
        {sel&&(
          <div style={{marginBottom:12}}>
            {!hasPw&&(
              <div style={{background:`${C.danger}08`,border:`1px solid ${C.danger}33`,borderRadius:12,padding:"14px",marginBottom:8}}>
                <div style={{fontSize:14,fontWeight:800,color:C.danger,marginBottom:4}}>⛔ 비밀번호 미설정</div>
                <div style={{fontSize:12,color:C.sub,lineHeight:1.7}}>
                  {sel.role==="admin"?"관리자 계정에 비밀번호를 설정하세요.":"관리자에게 비밀번호 설정을 요청하세요."}
                </div>
              </div>
            )}
            {hasPw&&(
              <div>
                <div style={{fontSize:12,color:C.sub,fontWeight:700,marginBottom:6}}>🔒 비밀번호</div>
                <div style={{position:"relative"}}>
                  <input
                    type={showPw?"text":"password"}
                    value={pw}
                    onChange={e=>{setPw(e.target.value);setPwError(false);}}
                    onKeyDown={e=>e.key==="Enter"&&handleLogin()}
                    placeholder="비밀번호 입력"
                    autoFocus
                    style={{width:"100%",background:C.card,
                      border:`1.5px solid ${pwError?C.danger:C.accent}`,
                      borderRadius:10,color:C.text,fontSize:15,
                      padding:"11px 44px 11px 14px",outline:"none",boxSizing:"border-box",
                      boxShadow:`0 0 0 3px ${pwError?C.danger+"22":C.accent+"18"}`}}/>
                  <button onClick={()=>setShowPw(v=>!v)}
                    style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",
                      background:"none",border:"none",color:C.sub,fontSize:18,cursor:"pointer"}}>
                    {showPw?"🙈":"👁️"}
                  </button>
                </div>
                {pwError&&<div style={{fontSize:12,color:C.danger,marginTop:5}}>⚠️ 비밀번호가 틀렸습니다</div>}
              </div>
            )}
          </div>
        )}

        <button onClick={handleLogin} disabled={!sel||!hasPw}
          style={{width:"100%",padding:"15px 0",marginBottom:12,
            background:(!sel||!hasPw)?C.muted:`linear-gradient(135deg,${C.accentL},${C.accent})`,
            color:(!sel||!hasPw)?C.dim:"#fff",
            border:"none",borderRadius:14,fontSize:16,fontWeight:800,
            cursor:(!sel||!hasPw)?"not-allowed":"pointer",
            transition:"all 0.2s",
            boxShadow:(!sel||!hasPw)?"none":"0 4px 14px rgba(18,89,195,0.35)"}}>
          {!sel?"이름을 선택하세요":!hasPw?"비밀번호 설정 후 접속 가능":`${sel.name}으로 접속`}
        </button>
        <button onClick={onRequest}
          style={{width:"100%",padding:"13px 0",background:C.card,color:C.sub,
            border:`1px solid ${C.border}`,borderRadius:14,fontSize:14,fontWeight:600,cursor:"pointer"}}>
          처음 오셨나요? 접속 신청 →
        </button>
      </div>
    </div>
  );
}


/* ══ 접속 신청 ══ */
function AccessRequest({onSubmit,onBack}){
  const [name,setName]=useState("");
  const [dept,setDept]=useState("");
  const [purpose,setPurpose]=useState("");
  const [role,setRole]=useState("viewer");
  const [done,setDone]=useState(false);
  const inp={background:C.card,border:`1px solid ${C.border}`,borderRadius:10,color:C.text,fontSize:14,padding:"11px 13px",outline:"none",width:"100%",boxSizing:"border-box"};
  if(done) return(

      <div style={{fontSize:20,fontWeight:800,color:C.text,marginBottom:8}}>신청 완료!</div>
      <div style={{fontSize:13,color:C.sub,textAlign:"center",lineHeight:1.9,marginBottom:24}}>관리자 승인 후 접속 가능합니다.</div>
      <Btn onClick={onBack} color={C.accent}>확인</Btn>
    </div>
  );
  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      <Hdr title="접속 신청" sub="관리자 승인 후 사용 가능" onBack={onBack}/>
      <div style={{padding:"18px 16px 80px"}}>
        <div style={{background:`${C.accent}10`,border:`1px solid ${C.accent}30`,borderRadius:12,padding:"12px 14px",marginBottom:20,fontSize:12,color:C.accent}}>
          📋 정보를 입력하면 관리자가 검토 후 승인합니다.
        </div>
        <div style={{marginBottom:14}}><div style={{fontSize:13,color:C.text,fontWeight:700,marginBottom:7}}>이름 *</div><input value={name} onChange={e=>setName(e.target.value)} placeholder="실명 입력" style={inp}/></div>
        <div style={{marginBottom:14}}><div style={{fontSize:13,color:C.text,fontWeight:700,marginBottom:7}}>소속 / 부서 *</div><input value={dept} onChange={e=>setDept(e.target.value)} placeholder="예: 생산팀 / 외부 협력사" style={inp}/></div>
        <div style={{marginBottom:20}}><div style={{fontSize:13,color:C.text,fontWeight:700,marginBottom:7}}>사용 목적</div><input value={purpose} onChange={e=>setPurpose(e.target.value)} placeholder="예: 납기 확인 / 출하현황 조회" style={inp}/></div>
        <div style={{marginBottom:28}}>
          <div style={{fontSize:13,color:C.text,fontWeight:700,marginBottom:10}}>접속 유형</div>
          <div style={{display:"flex",gap:10}}>
            {[{k:"viewer",i:"👁️",l:"조회",d:"현황 확인"},{k:"staff",i:"👷",l:"출하팀",d:"출하 실행"}].map(r=>{
              const rc={viewer:C.done,staff:C.general}[r.k];
              const sel=role===r.k;
              return(
                <Card key={r.k} onClick={()=>setRole(r.k)}
                  style={{flex:1,padding:"14px 10px",cursor:"pointer",textAlign:"center",
                    border:`2px solid ${sel?rc:C.border}`,background:sel?`${rc}08`:C.card}}>
                  <div style={{fontSize:28,marginBottom:5}}>{r.i}</div>
                  <div style={{fontSize:14,fontWeight:800,color:sel?rc:C.text}}>{r.l}</div>
                  <div style={{fontSize:11,color:C.sub,marginTop:2}}>{r.d}</div>
                </Card>
              );
            })}
          </div>
        </div>
        <button onClick={()=>{
          if(!name.trim()||!dept.trim()) return;
          onSubmit({id:uidS(),name:name.trim(),dept:dept.trim(),purpose:purpose.trim(),wantedRole:role,requestedAt:fmtDT()});
          setDone(true);
        }} style={{width:"100%",padding:"15px 0",background:name.trim()&&dept.trim()?C.accent:C.muted,
          color:name.trim()&&dept.trim()?"#fff":C.dim,border:"none",borderRadius:14,fontSize:16,fontWeight:800,
          cursor:name.trim()&&dept.trim()?"pointer":"not-allowed"}}>
          신청하기
        </button>
      </div>
    </div>
  );
}

/* ══ 관리자 대시보드 ══ */
function AdminDash({posts,routes,members,pending,user,requests,onOpen,onNew,onRoute,onLocation,onStats,onUserMgmt,onZoneMgmt,onReqReview,onLogout}){
  const [tab,setTab]=useState("오늘");
  const [clientSearch,setClientSearch]=useState("");
  const today=todayStr();
  const todayPs=posts.filter(p=>p.date===today);
  const shownBase=tab==="오늘"?todayPs:tab==="전체"?posts:posts.filter(p=>p.category===tab||( tab==="사내출하"&&p.category==="사내출하"));
  const shown=clientSearch.trim()
    ?shownBase.filter(p=>(p.client||"").includes(clientSearch)||(p.requester||"").includes(clientSearch)||(p.groups||[]).some(g=>(g.region||"").includes(clientSearch)))
    :shownBase;

  const getKm=route=>{ let k=0; for(let i=1;i<route.stops.length;i++){ const a=route.stops[i-1],b=route.stops[i]; if(a.lat&&b.lat) k+=haversine(a.lat,a.lng,b.lat,b.lng); } return k; };

  const yangItems=todayPs.filter(p=>p.category==="양산출하").flatMap(p=>p.groups.flatMap(g=>g.items));
  const genItems=todayPs.filter(p=>p.category==="일반출하").flatMap(p=>p.groups.flatMap(g=>g.items));
  const yangPct=yangItems.length?Math.round(yangItems.filter(i=>i.done||i.stage==="회수").length/yangItems.length*100):0;
  const genPct=genItems.length?Math.round(genItems.filter(i=>i.done||i.stage==="회수").length/genItems.length*100):0;
  const visitCnt=todayPs.filter(p=>p.category==="사내방문").reduce((a,p)=>a+(p.visits||[]).length,0);
  const todayKm=routes.filter(r=>r.date===today).reduce((a,r)=>a+getKm(r),0);
  const incompleteReqs=todayPs.filter(p=>p.category!=="사내방문"&&!checkQuality(p).ok).length;
  const unconfLoc=posts.filter(p=>p.category!=="사내방문").flatMap(p=>p.groups.flatMap(g=>g.items)).filter(i=>!i.done&&i.stage!=="회수"&&!i.loc?.confirmed).length;

  const staffStats=members.filter(u=>u.role==="staff").map(u=>{
    const its=todayPs.filter(p=>p.category!=="사내방문").flatMap(p=>p.groups.filter(g=>g.assignee===u.id).flatMap(g=>g.items));
    const done=its.filter(i=>i.done||i.stage==="회수").length;
    return{...u,total:its.length,done,pct:its.length?Math.round(done/its.length*100):0};
  });

  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      <Hdr title="지용금속 출하관리" sub="👑 관리자"

          <div style={{display:"flex",gap:6}}>
            <button onClick={onReqReview} style={{position:"relative",background:C.muted,color:C.accent,border:`1px solid ${C.border}`,borderRadius:9,padding:"7px 10px",fontSize:13,cursor:"pointer",fontWeight:700}} title="출하 요청 검토">
              📬{(requests||[]).filter(r=>r.status==="대기").length>0&&<span style={{position:"absolute",top:-4,right:-4,background:C.danger,color:"#fff",fontSize:9,fontWeight:800,borderRadius:8,padding:"1px 5px"}}>{(requests||[]).filter(r=>r.status==="대기").length}</span>}
            </button>
            <button onClick={onZoneMgmt} style={{background:C.muted,color:C.general,border:`1px solid ${C.border}`,borderRadius:9,padding:"7px 10px",fontSize:13,cursor:"pointer",fontWeight:700}} title="창고 구역 관리">🏢</button>
            <button onClick={onLocation} style={{position:"relative",background:C.muted,color:C.loc,border:`1px solid ${C.border}`,borderRadius:9,padding:"7px 10px",fontSize:13,cursor:"pointer"}}>
              📍{unconfLoc>0&&<span style={{position:"absolute",top:-4,right:-4,background:C.warn,color:"#fff",fontSize:9,fontWeight:800,borderRadius:8,padding:"1px 5px"}}>{unconfLoc}</span>}
            </button>
            <button onClick={onRoute} style={{background:C.muted,color:C.route,border:`1px solid ${C.border}`,borderRadius:9,padding:"7px 10px",fontSize:13,cursor:"pointer"}}>🗺️</button>
            <button onClick={onStats} style={{background:C.muted,color:C.accent,border:`1px solid ${C.border}`,borderRadius:9,padding:"7px 10px",fontSize:13,cursor:"pointer"}}>📊</button>
            {(user.role==="admin"||user.permissions?.canRegister)&&(
              {(user.role==="admin"||user.permissions?.canRegister)&&(
                <button onClick={onNew} style={{background:`linear-gradient(135deg,${C.accentL},${C.accent})`,color:"#fff",border:"none",borderRadius:9,padding:"7px 12px",fontSize:13,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 12px rgba(18,89,195,0.35)"}}>+ 등록</button>
              )}
            )}
            <button onClick={onUserMgmt} style={{position:"relative",background:C.muted,color:C.sub,border:`1px solid ${C.border}`,borderRadius:9,padding:"7px 10px",fontSize:13,cursor:"pointer"}}>
              👥{pending.length>0&&<span style={{position:"absolute",top:-4,right:-4,background:C.danger,color:"#fff",fontSize:9,fontWeight:800,borderRadius:8,padding:"1px 5px"}}>{pending.length}</span>}
            </button>
            <button onClick={onLogout} style={{background:C.muted,color:C.sub,border:`1px solid ${C.border}`,borderRadius:9,padding:"7px 9px",fontSize:12,cursor:"pointer"}}>나가기</button>
          </div>
        }/>

      <div style={{padding:"14px 14px 100px"}}>
        {/* 알림 배너 */}
        {/* 출하 요청 대기 배너 */}
        {(requests||[]).filter(r=>r.status==="대기").length>0&&(
          <div onClick={onReqReview} style={{background:`${C.accent}08`,border:`1px solid ${C.accent}33`,borderRadius:12,padding:"11px 14px",marginBottom:10,cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:18}}>📬</span>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700,color:C.accent}}>출하 요청 대기 {(requests||[]).filter(r=>r.status==="대기").length}건</div>
              <div style={{fontSize:11,color:C.sub,marginTop:1}}>탭하여 검토 및 일정 확정</div>
            </div>
            <span style={{color:C.accent,fontSize:18}}>›</span>
          </div>
        )}
        {incompleteReqs>0&&(
          <div onClick={onNew} style={{background:`${C.danger}08`,border:`1px solid ${C.danger}33`,borderRadius:12,padding:"11px 14px",marginBottom:10,cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:18}}>⚠️</span>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700,color:C.danger}}>불완전 의뢰서 {incompleteReqs}건</div>
              <div style={{fontSize:11,color:C.sub}}>정보 부족으로 출하 지연 가능</div>
            </div>
            <span style={{color:C.danger,fontSize:18}}>›</span>
          </div>
        )}
        {unconfLoc>0&&(
          <div onClick={onLocation} style={{background:`${C.loc}08`,border:`1px solid ${C.loc}33`,borderRadius:12,padding:"11px 14px",marginBottom:10,cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:18}}>📍</span>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700,color:C.loc}}>위치 미확인 품목 {unconfLoc}건</div>
              <div style={{fontSize:11,color:C.sub}}>완제품 위치 확인 필요</div>
            </div>
            <span style={{color:C.loc,fontSize:18}}>›</span>
          </div>
        )}
        {pending.length>0&&(
          <div onClick={onUserMgmt} style={{background:`#AF52DE10`,border:`1px solid #AF52DE44`,borderRadius:12,padding:"11px 14px",marginBottom:10,cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:18}}>⏳</span>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:C.text}}>접속 승인 대기 {pending.length}건</div></div>
            <span style={{color:C.sub,fontSize:18}}>›</span>
          </div>
        )}

        {/* KPI */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
          {[
            {label:"양산출하",val:`${yangPct}%`,sub:`${yangItems.filter(i=>i.done||i.stage==="회수").length}/${yangItems.length}건`,color:C.yangsan,icon:"🏭"},
            {label:"일반출하",val:`${genPct}%`,sub:`${genItems.filter(i=>i.done||i.stage==="회수").length}/${genItems.length}건`,color:C.general,icon:"📦"},
            {label:"오늘 운행",val:`${todayKm.toFixed(0)}km`,sub:`${routes.filter(r=>r.date===today).length}명 운행`,color:C.route,icon:"🚗"},
            {label:"사내방문",val:`${visitCnt}건`,sub:"오늘 방문",color:C.visit,icon:"🚶"},
            {label:"사내출하",val:`${todayPs.filter(p=>p.category==="사내출하").length}건`,sub:"오늘 사내",color:C.process,icon:"🏢"},
          ].map(k=>(
            <Card key={k.label} style={{padding:"14px",position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",top:-6,right:-4,fontSize:40,opacity:0.07}}>{k.icon}</div>
              <div style={{fontSize:10,color:C.sub,fontWeight:700,marginBottom:5}}>{k.label}</div>
              <div style={{fontSize:28,fontWeight:900,fontFamily:"monospace",color:k.color,lineHeight:1}}>{k.val}</div>
              <div style={{fontSize:11,color:C.sub,marginTop:3}}>{k.sub}</div>
            </Card>

        {/* 출하 현황 */}

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>

          </div>
          {[{label:"🏭 양산출하",color:C.yangsan,items:yangItems},{label:"📦 일반출하",color:C.general,items:genItems}].map(({label,color,items})=>{
            const d=items.filter(i=>i.done||i.stage==="회수").length;
            const pct=items.length?Math.round(d/items.length*100):0;
            return(
              <div key={label} style={{marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <span style={{fontSize:13,fontWeight:700,color}}>{label}</span>
                  <span style={{fontSize:13,fontWeight:700,color}}>{pct}% <span style={{color:C.sub,fontSize:11}}>({d}/{items.length})</span></span>
                </div>
                <PBar pct={pct} color={color} h={10}/>
              </div>
            );
          })}
        </Card>

        {/* 직원별 현황 */}
        <Card style={{padding:"16px",marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <span style={{fontSize:14,fontWeight:800,color:C.text}}>직원별 오늘 현황</span>
            <button onClick={onUserMgmt} style={{background:C.muted,color:C.sub,border:`1px solid ${C.border}`,borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>팀원관리</button>
          </div>
          {staffStats.map(u=>(
            <div key={u.id} style={{background:C.card2,borderRadius:12,padding:"11px 13px",marginBottom:8,border:`1px solid ${C.border}`}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:u.total>0?7:0}}>
                <Avatar name={u.name} color={u.specialty==="양산"?C.yangsan:C.general} size={32}/>
                <div style={{flex:1}}>
                  <div style={{display:"flex",justifyContent:"space-between"}}>
                    <div>
                      <span style={{fontSize:14,fontWeight:700,color:C.text}}>{u.name}</span>
                      <span style={{fontSize:9,fontWeight:700,marginLeft:6,padding:"1px 5px",borderRadius:6,
                        background:u.specialty==="양산"?(C.yangsan+"15"):(C.general+"15"),
                        color:u.specialty==="양산"?C.yangsan:C.general}}>
                        {u.specialty==="양산"?"🏭":"📦"} {u.specialty}
                      </span>
                    </div>
                    <span style={{fontSize:12,fontFamily:"monospace",fontWeight:700,
                      color:u.pct===100?C.done:u.pct>50?C.warn:C.accent}}>
                      {u.total?`${u.done}/${u.total}건`:"미배정"}
                    </span>
                  </div>
                </div>
              </div>
              {u.total>0&&<PBar pct={u.pct} color={u.pct===100?C.done:u.specialty==="양산"?C.yangsan:C.general} h={5}/>}
            </div>
          ))}
        </Card>

        {/* 업체 검색 */}
        <div style={{position:"relative",marginBottom:12}}>
          <input value={clientSearch} onChange={e=>setClientSearch(e.target.value)}
            placeholder="🔍 업체명 / 거래처 검색"
            style={{width:"100%",background:C.card,border:`1.5px solid ${clientSearch?C.accent:C.border}`,borderRadius:12,padding:"11px 42px 11px 16px",fontSize:14,outline:"none",color:C.text,boxSizing:"border-box",boxShadow:C.shadow,transition:"border-color 0.2s"}}/>
          {clientSearch&&<button onClick={()=>setClientSearch("")} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.sub,fontSize:16,cursor:"pointer",lineHeight:1}}>✕</button>}
        </div>

        {/* 탭 필터 */}
        <div style={{display:"flex",gap:0,marginBottom:12,background:C.card,borderRadius:12,padding:4,boxShadow:C.shadow}}>
          {["오늘","전체","양산출하","일반출하","사내출하","사내방문"].map(t=>{
            const sl=tab===t; const cc=CAT[t];
            return(
              <button key={t} onClick={()=>setTab(t)}
                style={{flex:1,padding:"8px 2px",borderRadius:9,fontSize:10,fontWeight:700,border:"none",
                  background:sl?(cc?cc.color:C.accent):"transparent",
                  color:sl?"#fff":C.sub,cursor:"pointer",transition:"all 0.15s"}}>
                {cc?cc.icon:t==="오늘"?"📅":"📋"}<br/>
                {t==="양산출하"?"양산":t==="일반출하"?"일반":t==="사내출하"?"사내":t==="사내방문"?"방문":t}
              </button>
            );
          })}
        </div>
        {shown.map(p=><PostCard key={p.id} post={p} onClick={()=>onOpen(p.id)}/>)}
      </div>
    </div>
  );
}

/* ══ 열람자·직원 대시보드 ══ */

    :[];

  const getKm=route=>{ let k=0; for(let i=1;i<route.stops.length;i++){ const a=route.stops[i-1],b=route.stops[i]; if(a.lat&&b.lat) k+=haversine(a.lat,a.lng,b.lat,b.lng); } return k; };

  const [vSearch,setVSearch]=useState("");

  // ── 동기화 인디케이터 ──
  const syncBar = document.getElementById('sync-indicator');
  const offlineToast = document.getElementById('offline-toast');

  window.showSyncing = function(){
    syncBar.className = 'syncing';
    setTimeout(()=>{ syncBar.className = 'online'; setTimeout(()=>{ syncBar.className=''; },1200); }, 800);
  };

  window.addEventListener('online',  ()=>{ offlineToast.classList.remove('show'); syncBar.className='online'; setTimeout(()=>syncBar.className='',2000); });
  window.addEventListener('offline', ()=>{ offlineToast.classList.add('show'); syncBar.className='offline'; });
  if(!navigator.onLine) offlineToast.classList.add('show');

  // Firebase 실시간 연결 상태 감지
  if(window.__FB_CONFIGURED__ && window.firebase?.apps?.length){
    const connRef = firebase.database().ref('.info/connected');
    connRef.on('value', snap=>{
      if(snap.val()===true){
        offlineToast.classList.remove('show');
      } else {
        offlineToast.classList.add('show');
      }
    });
  }

  // ── PWA 설치 배너 ──
  let deferredPrompt = null;
  const banner = document.getElementById('install-banner');
  const installBtn = document.getElementById('install-btn');
  const closeBtn = document.getElementById('install-close');

  window.addEventListener('beforeinstallprompt', e=>{
    e.preventDefault(); deferredPrompt=e;
    if(!localStorage.getItem('pwa-installed')) banner.classList.add('show');
  });
  installBtn && installBtn.addEventListener('click', async ()=>{
    if(!deferredPrompt){
      alert('📱 설치 방법\n\n【안드로이드】\n브라우저 메뉴(⋮) → "홈 화면에 추가"\n\n【아이폰】\n공유버튼(□↑) → "홈 화면에 추가"');
      return;
    }
    deferredPrompt.prompt();
    const {outcome} = await deferredPrompt.userChoice;
    if(outcome==='accepted'){ localStorage.setItem('pwa-installed','1'); banner.classList.remove('show'); }
    deferredPrompt=null;
  });
  closeBtn && closeBtn.addEventListener('click', ()=>{ banner.classList.remove('show'); localStorage.setItem('pwa-banner-closed', Date.now()); });
  window.addEventListener('appinstalled', ()=>{ banner.classList.remove('show'); localStorage.setItem('pwa-installed','1'); });

  const isInstalled=!!localStorage.getItem('pwa-installed');
  const isStandalone=window.matchMedia('(display-mode:standalone)').matches||window.navigator.standalone;
  const closedAt=parseInt(localStorage.getItem('pwa-banner-closed')||'0');
  const recentlyClosed=Date.now()-closedAt<86400000;
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);

  if(!isInstalled&&!isStandalone&&!recentlyClosed&&!isIOS){
    setTimeout(()=>banner.classList.add('show'), 3000);
  }
  if(isIOS&&!isStandalone&&!localStorage.getItem('ios-hint-shown')){
    setTimeout(()=>{
      const hint=document.createElement('div');
      hint.style.cssText='position:fixed;bottom:80px;left:16px;right:16px;background:#1C1C1E;color:#fff;border-radius:16px;padding:16px 18px;z-index:9999;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:13px;line-height:1.7;box-shadow:0 8px 30px rgba(0,0,0,0.5)';
      hint.innerHTML='<div style="font-size:16px;font-weight:700;margin-bottom:6px">📱 홈화면에 추가 (iPhone/iPad)</div><div>① 하단 <strong style="color:#0A84FF">공유버튼(□↑)</strong> 탭</div><div>② <strong style="color:#0A84FF">"홈 화면에 추가"</strong> → 추가</div><button id="ios-close" style="position:absolute;top:12px;right:14px;background:none;border:none;color:rgba(255,255,255,0.6);font-size:20px;cursor:pointer">✕</button>';
      document.body.appendChild(hint);
      document.getElementById('ios-close').onclick=()=>{ hint.remove(); localStorage.setItem('ios-hint-shown','1'); };
      setTimeout(()=>hint.parentNode&&hint.remove(), 10000);
    }, 3000);
  }

  // ── 서비스워커 ──
  if('serviceWorker' in navigator){
    const sw=`const C='jyexpress-v4';self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));});`;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
  }
  </script>
