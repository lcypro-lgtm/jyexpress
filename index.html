    // Firebase 콘솔(console.firebase.google.com)에서 프로젝트 생성 후
    // 아래 값들을 실제 값으로 교체하세요.
    // 설정 방법: 앱 → 톱니바퀴 → 프로젝트 설정 → 내 앱 → SDK 설정 및 구성
    const FIREBASE_CONFIG = {
      apiKey:            "여기에_apiKey_입력",
      authDomain:        "여기에_authDomain_입력",
      databaseURL:       "여기에_databaseURL_입력",
      projectId:         "여기에_projectId_입력",
      storageBucket:     "여기에_storageBucket_입력",
      messagingSenderId: "여기에_messagingSenderId_입력",
      appId:             "여기에_appId_입력"
    };

    // 설정값이 실제 값인지 확인
    const FB_CONFIGURED = !FIREBASE_CONFIG.apiKey.includes("여기에");

    if(FB_CONFIGURED){
      try {
        firebase.initializeApp(FIREBASE_CONFIG);
        console.log("✅ Firebase 연결됨");
      } catch(e) {
        console.warn("Firebase 초기화 오류:", e);
      }
    } else {
      console.warn("⚠️ Firebase 미설정 — localStorage 모드로 실행");
    }

    // 연결 상태를 window에 노출
    window.__FB_CONFIGURED__ = FB_CONFIGURED;
  </script>

const haversine=(la1,lo1,la2,lo2)=>{
  const R=6371,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
};

const calcDone=post=>{
  if(post.category==="사내방문") return { done:(post.visits||[]).length, total:(post.visits||[]).length, pct:100 };
  const all=(post.groups||[]).flatMap(g=>(g.items||[]));
  const done=all.filter(i=>i.stage?i.stage==="회수":i.done).length;
  return { done, total:all.length, pct:all.length?Math.round(done/all.length*100):0 };
};
const checkQuality=post=>{
  if(post.category==="사내방문"||post.category==="사내출하") return { ok:true, missing:[] };
  if(!(post.groups||[]).length) return { ok:false, missing:["품목정보"] };
  const m=[];
  if(!post.client?.trim()) m.push("거래처명");
  if(!post.requester?.trim()) m.push("의뢰자");
  if(!post.urgency) m.push("긴급도");
  if(!post.packaging?.trim()) m.push("포장형태");
  const items=post.groups.flatMap(g=>g.items);
  if(items.some(i=>i.text&&!i.detail?.trim())) m.push("LOT번호");
  if(items.some(i=>i.text&&!i.loc?.zone)) m.push("완제품위치");
  return { ok:m.length===0, missing:m };
};

function Card({children,style={},onClick}){
  return(

function Btn({children,color,outline,small,style={},onClick,disabled}){
  const bg=outline?`${color||C.accent}12`:(color||C.accent);
  const fc=outline?(color||C.accent):"#fff";
  const bd=outline?`1.5px solid ${color||C.accent}`:"none";
  return(
    <button onClick={onClick} disabled={disabled}
      style={{background:disabled?C.muted:bg,color:disabled?C.dim:fc,border:disabled?"none":bd,
        borderRadius:10,padding:small?"6px 12px":"10px 16px",fontSize:small?12:14,fontWeight:700,
        cursor:disabled?"not-allowed":"pointer",userSelect:"none",WebkitTapHighlightColor:"transparent",
        transition:"all 0.15s",...style}}>
      {children}

}

function Avatar({name,color,size=36}){
  return(
    <div style={{width:size,height:size,borderRadius:"50%",flexShrink:0,

function ImgModal({src,onClose}){

function PhotoUpBtn({onAdd,small=false}){
  const ref=useRef();
  async function handle(e){
    const urls=await Promise.all(Array.from(e.target.files).map(readFile));
    urls.forEach(u=>onAdd(u)); e.target.value="";
  }
  const sz=small?50:80;
  return(
    <>
      <input ref={ref} type="file" accept="image/*" multiple onChange={handle} style={{display:"none"}}/>
      <button onClick={()=>ref.current.click()}
        style={{width:sz,height:sz,borderRadius:10,border:`1.5px dashed ${C.border}`,
          background:C.card2,color:C.sub,fontSize:small?16:20,cursor:"pointer",flexShrink:0,
          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
        🖼️<span style={{fontSize:9,color:C.sub}}>{small?"사진":"사진추가"}</span>
      </button>
    </>
  );

function TransBadge({transport}){
  if(!transport||transport==="자차") return null;
  const c=TRANS_COLOR[transport]||C.dim;
  return(
    <span style={{background:`${c}18`,color:c,border:`1px solid ${c}44`,
      fontSize:10,fontWeight:800,padding:"2px 7px",borderRadius:10}}>
      {TRANS_ICON[transport]} {transport}
    </span>
  );
}

function LocBadge({loc}){
  if(!loc?.zone) return null;
  const txt=`${loc.zone}${loc.rack?` ${loc.rack}`:""}${loc.pallet?`-${loc.pallet}`:""}`;
  return(
    <span style={{background:`${C.loc}15`,color:C.loc,border:`1px solid ${C.loc}44`,

function QBadge({post}){

  const {ok}=checkQuality(post);
  return(
    <span style={{background:ok?`${C.done}15`:`${C.danger}10`,color:ok?C.done:C.danger,

      padding:"2px 7px",borderRadius:10}}>

function UrgBadge({urgency}){
  if(!urgency||urgency==="일반") return null;
  const c=URG_COLOR[urgency];
  return(
    <span style={{background:`${c}15`,color:c,border:`1px solid ${c}44`,
      fontSize:10,fontWeight:800,padding:"2px 7px",borderRadius:10}}>

/* ── PostCard ── */
function PostCard({post,onClick}){
  const cc=CAT[post.category]||CAT["일반출하"];
  const isVisit=post.category==="사내방문";
  const {done,total,pct}=calcDone({...post,groups:post.groups||[]});
  return(
    <Card onClick={onClick} style={{marginBottom:10,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
      <div style={{height:4,background:cc.color}}/>
      <div style={{padding:"12px 14px"}}>
        <div style={{display:"flex",justifyContent:"space-between",gap:10}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:6,flexWrap:"wrap"}}>
              <span style={{background:cc.bg,color:cc.color,fontSize:11,fontWeight:800,padding:"3px 9px",borderRadius:20}}>
                {cc.icon} {post.category}
              </span>
              <UrgBadge urgency={post.urgency}/>
              {!isVisit&&<QBadge post={post}/>}
              <TransBadge transport={post.transport}/>
              <span style={{fontSize:11,color:C.sub}}>{post.date.slice(5).replace("-","/")} {post.time}</span>
            </div>
            {post.client&&<div style={{fontSize:15,fontWeight:800,color:C.text}}>{post.client}</div>}
            {!isVisit&&<div style={{fontSize:12,color:C.sub,marginTop:2}}>{post.groups.map(g=>g.region).join(" · ")}</div>}
            {post.requester&&<div style={{fontSize:11,color:C.sub,marginTop:2}}>📋 {post.requester}</div>}
          </div>
          <div style={{textAlign:"right"}}>
            {isVisit
              ?<><div style={{fontSize:26,fontWeight:900,fontFamily:"monospace",color:C.visit}}>{(post.visits||[]).length}</div><div style={{fontSize:10,color:C.sub}}>방문건</div></>
              :<><div style={{fontSize:24,fontWeight:900,fontFamily:"monospace",color:pct===100?C.done:pct>50?C.warn:C.accent}}>{pct}%</div><div style={{fontSize:11,color:C.sub}}>{done}/{total}</div></>
            }
          </div>
        </div>
        {!isVisit&&<div style={{marginTop:8}}><PBar pct={pct} color={cc.color} h={5}/></div>}
        {isVisit&&(post.visits||[]).slice(0,2).map(v=>(
          <div key={v.id} style={{fontSize:11,color:C.sub,marginTop:5}}>
            🚶 {v.visitorName}({v.dept}) · {v.items}
          </div>
        ))}
      </div>
    </Card>
  );
}

/* ══ 로그인 ══ */
function Login({members,pendingCount,onLogin,onRequest}){
  const [sel,setSel]=useState(null);
  const [pw,setPw]=useState("");
  const [pwError,setPwError]=useState(false);
  const [showPw,setShowPw]=useState(false);

  const roles=[
    {key:"admin",label:"관리자",color:C.accent,icon:"👑",users:members.filter(u=>u.role==="admin")},
    {key:"staff",label:"출하팀",color:C.general,icon:"👷",users:members.filter(u=>u.role==="staff")},
    {key:"viewer",label:"조회",color:C.done,icon:"👁️",users:members.filter(u=>u.role==="viewer")},
  ];

  function handleLogin(){
    if(!sel) return;
    if(!sel.password){ setPwError(true); return; }
    if(pw!==sel.password){ setPwError(true); return; }
    setPwError(false);
    onLogin(sel);
  }

  const hasPw = sel && !!sel.password;

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",padding:"36px 20px"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{width:76,height:76,borderRadius:24,background:`linear-gradient(145deg,${C.accentL},${C.accent})`,margin:"0 auto 16px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:38,boxShadow:"0 8px 24px rgba(18,89,195,0.35)"}}>🏭</div>
        <div style={{fontSize:22,fontWeight:900,color:C.text}}>지용금속 출하관리</div>
        <div style={{fontSize:13,color:C.sub,marginTop:6}}>이름 선택 → 비밀번호 입력 후 접속</div>
      </div>
      <div style={{width:"100%",maxWidth:360}}>
        {roles.map(({key,label,color,icon,users})=>{
          if(!users.length) return null;
          return(
            <div key={key} style={{marginBottom:18}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <div style={{height:1,flex:1,background:C.border}}/>
                <span style={{fontSize:11,color:C.sub,fontWeight:700}}>{icon} {label}</span>
                <div style={{height:1,flex:1,background:C.border}}/>
              </div>
              {key==="admin"
                ? users.map(u=>(
                  <Card key={u.id} onClick={()=>{setSel(sel?.id===u.id?null:u);setPw("");setPwError(false);}}
                    style={{padding:"14px 16px",cursor:"pointer",marginBottom:8,
                      border:`2px solid ${sel?.id===u.id?color:C.border}`,
                      background:sel?.id===u.id?`${color}08`:C.card}}>
                    <div style={{display:"flex",alignItems:"center",gap:12}}>
                      <Avatar name={u.name} color={color} size={46}/>
                      <div style={{flex:1}}>
                        <div style={{fontSize:16,fontWeight:700,color:C.text}}>{u.name}</div>
                        <div style={{fontSize:12,color:C.sub,marginTop:2}}>
                          전체 관리 · 통계 · 운행관리
                          {pendingCount>0&&<span style={{marginLeft:8,background:C.danger,color:"#fff",fontSize:10,fontWeight:800,borderRadius:8,padding:"1px 6px"}}>대기 {pendingCount}</span>}
                        </div>
                      </div>
                      {sel?.id===u.id&&<span style={{color,fontSize:20}}>✓</span>}
                    </div>
                  </Card>
                ))
                : (
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    {users.map(u=>(
                      <Card key={u.id} onClick={()=>{setSel(sel?.id===u.id?null:u);setPw("");setPwError(false);}}
                        style={{padding:"12px 10px",cursor:"pointer",
                          border:`2px solid ${sel?.id===u.id?color:C.border}`,
                          background:sel?.id===u.id?`${color}08`:C.card,
                          display:"flex",flexDirection:"column",alignItems:"center",gap:5,position:"relative"}}>
                        <Avatar name={u.name} color={color} size={36}/>
                        <div style={{textAlign:"center"}}>
                          <div style={{fontSize:13,fontWeight:700,color:C.text}}>{u.name}</div>
                          <div style={{fontSize:10,color:C.sub,marginTop:1}}>{u.dept}{u.region?` · ${u.region}`:""}</div>
                          {u.specialty&&<div style={{fontSize:9,fontWeight:700,marginTop:2,color:u.specialty==="양산"?C.yangsan:C.general}}>{u.specialty==="양산"?"🏭 양산전담":"📦 일반담당"}</div>}
                        </div>
                        {sel?.id===u.id&&<span style={{position:"absolute",top:6,right:8,color,fontSize:14,fontWeight:900}}>✓</span>}
                      </Card>
                    ))}
                  </div>
                )
              }
            </div>
          );
        })}

        {/* 비밀번호 입력 영역 */}
        {sel&&(
          <div style={{marginBottom:12}}>
            {!hasPw&&(
              <div style={{background:`${C.danger}08`,border:`1px solid ${C.danger}33`,borderRadius:12,padding:"14px",marginBottom:8}}>
                <div style={{fontSize:14,fontWeight:800,color:C.danger,marginBottom:4}}>⛔ 비밀번호 미설정</div>
                <div style={{fontSize:12,color:C.sub,lineHeight:1.7}}>
                  {sel.role==="admin"?"관리자 계정에 비밀번호를 설정하세요.":"관리자에게 비밀번호 설정을 요청하세요."}
                </div>
              </div>
            )}
            {hasPw&&(
              <div>
                <div style={{fontSize:12,color:C.sub,fontWeight:700,marginBottom:6}}>🔒 비밀번호</div>
                <div style={{position:"relative"}}>
                  <input
                    type={showPw?"text":"password"}
                    value={pw}
                    onChange={e=>{setPw(e.target.value);setPwError(false);}}
                    onKeyDown={e=>e.key==="Enter"&&handleLogin()}
                    placeholder="비밀번호 입력"
                    autoFocus
                    style={{width:"100%",background:C.card,
                      border:`1.5px solid ${pwError?C.danger:C.accent}`,
                      borderRadius:10,color:C.text,fontSize:15,
                      padding:"11px 44px 11px 14px",outline:"none",boxSizing:"border-box",
                      boxShadow:`0 0 0 3px ${pwError?C.danger+"22":C.accent+"18"}`}}/>
                  <button onClick={()=>setShowPw(v=>!v)}
                    style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",
                      background:"none",border:"none",color:C.sub,fontSize:18,cursor:"pointer"}}>
                    {showPw?"🙈":"👁️"}
                  </button>
                </div>
                {pwError&&<div style={{fontSize:12,color:C.danger,marginTop:5}}>⚠️ 비밀번호가 틀렸습니다</div>}
              </div>
            )}
          </div>
        )}

        <button onClick={handleLogin} disabled={!sel||!hasPw}
          style={{width:"100%",padding:"15px 0",marginBottom:12,
            background:(!sel||!hasPw)?C.muted:`linear-gradient(135deg,${C.accentL},${C.accent})`,
            color:(!sel||!hasPw)?C.dim:"#fff",
            border:"none",borderRadius:14,fontSize:16,fontWeight:800,
            cursor:(!sel||!hasPw)?"not-allowed":"pointer",
            transition:"all 0.2s",
            boxShadow:(!sel||!hasPw)?"none":"0 4px 14px rgba(18,89,195,0.35)"}}>
          {!sel?"이름을 선택하세요":!hasPw?"비밀번호 설정 후 접속 가능":`${sel.name}으로 접속`}
        </button>

      <div style={{padding:"18px 16px 80px"}}>
        <div style={{background:`${C.accent}10`,border:`1px solid ${C.accent}30`,borderRadius:12,padding:"12px 14px",marginBottom:20,fontSize:12,color:C.accent}}>
          📋 정보를 입력하면 관리자가 검토 후 승인합니다.
        </div>
        <div style={{marginBottom:14}}><div style={{fontSize:13,color:C.text,fontWeight:700,marginBottom:7}}>이름 *</div><input value={name} onChange={e=>setName(e.target.value)} placeholder="실명 입력" style={inp}/></div>
        <div style={{marginBottom:14}}><div style={{fontSize:13,color:C.text,fontWeight:700,marginBottom:7}}>소속 / 부서 *</div><input value={dept} onChange={e=>setDept(e.target.value)} placeholder="예: 생산팀 / 외부 협력사" style={inp}/></div>
        <div style={{marginBottom:20}}><div style={{fontSize:13,color:C.text,fontWeight:700,marginBottom:7}}>사용 목적</div><input value={purpose} onChange={e=>setPurpose(e.target.value)} placeholder="예: 납기 확인 / 출하현황 조회" style={inp}/></div>
        <div style={{marginBottom:28}}>
          <div style={{fontSize:13,color:C.text,fontWeight:700,marginBottom:10}}>접속 유형</div>
          <div style={{display:"flex",gap:10}}>
            {[{k:"viewer",i:"👁️",l:"조회",d:"현황 확인"},{k:"staff",i:"👷",l:"출하팀",d:"출하 실행"}].map(r=>{
              const rc={viewer:C.done,staff:C.general}[r.k];
              const sel=role===r.k;
              return(
                <Card key={r.k} onClick={()=>setRole(r.k)}
                  style={{flex:1,padding:"14px 10px",cursor:"pointer",textAlign:"center",
                    border:`2px solid ${sel?rc:C.border}`,background:sel?`${rc}08`:C.card}}>
                  <div style={{fontSize:28,marginBottom:5}}>{r.i}</div>
                  <div style={{fontSize:14,fontWeight:800,color:sel?rc:C.text}}>{r.l}</div>
                  <div style={{fontSize:11,color:C.sub,marginTop:2}}>{r.d}</div>
                </Card>
              );
            })}
          </div>
        </div>
        <button onClick={()=>{
          if(!name.trim()||!dept.trim()) return;
          onSubmit({id:uidS(),name:name.trim(),dept:dept.trim(),purpose:purpose.trim(),wantedRole:role,requestedAt:fmtDT()});
          setDone(true);
        }} style={{width:"100%",padding:"15px 0",background:name.trim()&&dept.trim()?C.accent:C.muted,
          color:name.trim()&&dept.trim()?"#fff":C.dim,border:"none",borderRadius:14,fontSize:16,fontWeight:800,
          cursor:name.trim()&&dept.trim()?"pointer":"not-allowed"}}>
          신청하기
        </button>
      </div>
    </div>
  );
}

  const shown=clientSearch.trim()
    ?shownBase.filter(p=>(p.client||"").includes(clientSearch)||(p.requester||"").includes(clientSearch)||(p.groups||[]).some(g=>(g.region||"").includes(clientSearch)))
    :shownBase;

  const getKm=route=>{ let k=0; for(let i=1;i<route.stops.length;i++){ const a=route.stops[i-1],b=route.stops[i]; if(a.lat&&b.lat) k+=haversine(a.lat,a.lng,b.lat,b.lng); } return k; };

  const yangItems=todayPs.filter(p=>p.category==="양산출하").flatMap(p=>p.groups.flatMap(g=>g.items));
  const genItems=todayPs.filter(p=>p.category==="일반출하").flatMap(p=>p.groups.flatMap(g=>g.items));
  const yangPct=yangItems.length?Math.round(yangItems.filter(i=>i.done||i.stage==="회수").length/yangItems.length*100):0;
  const genPct=genItems.length?Math.round(genItems.filter(i=>i.done||i.stage==="회수").length/genItems.length*100):0;
  const visitCnt=todayPs.filter(p=>p.category==="사내방문").reduce((a,p)=>a+(p.visits||[]).length,0);
  const todayKm=routes.filter(r=>r.date===today).reduce((a,r)=>a+getKm(r),0);
  const incompleteReqs=todayPs.filter(p=>p.category!=="사내방문"&&!checkQuality(p).ok).length;

  const staffStats=members.filter(u=>u.role==="staff").map(u=>{

    const done=its.filter(i=>i.done||i.stage==="회수").length;

            <button onClick={onLocation} style={{position:"relative",background:C.muted,color:C.loc,border:`1px solid ${C.border}`,borderRadius:9,padding:"7px 10px",fontSize:13,cursor:"pointer"}}>

        {/* 탭 필터 */}

            );

        </div>
        {shown.map(p=><PostCard key={p.id} post={p} onClick={()=>onOpen(p.id)}/>)}
      </div>
    </div>
  );
}

            <button onClick={onMyRequests} style={{position:"relative",background:C.muted,color:C.accent,border:`1px solid ${C.accent}33`,borderRadius:9,padding:"7px 10px",fontSize:13,cursor:"pointer",fontWeight:700}}>

          <button onClick={onRoute} style={{background:C.route,color:"#fff",border:"none",borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>기록</button>
        </div>
      )}

      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,display:"flex",overflowX:"auto"}}>
        {tabs.map(t=>(
          <button key={t} onClick={()=>setTab(t)}
            style={{padding:"13px 14px",background:"none",border:"none",
              borderBottom:`3px solid ${tab===t?C.accent:"transparent"}`,
              color:tab===t?C.accent:C.sub,fontSize:13,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
            {t}
          </button>
        ))}
      </div>

      <div style={{padding:"16px 14px 100px"}}>
        {tab==="출하현황"&&(
          <>
            <div style={{display:"flex",gap:10,marginBottom:14}}>
              {[{label:"양산출하",color:C.yangsan,icon:"🏭",pct:yangPct,items:yangItems},{label:"일반출하",color:C.general,icon:"📦",pct:genPct,items:genItems}].map(x=>(
                <Card key={x.label} style={{flex:1,padding:"15px 12px"}}>
                  <div style={{fontSize:22,marginBottom:4}}>{x.icon}</div>
                  <div style={{fontSize:11,color:x.color,fontWeight:800,marginBottom:5}}>{x.label}</div>
                  <div style={{fontSize:30,fontWeight:900,fontFamily:"monospace",color:x.pct===100?C.done:x.color,lineHeight:1}}>{x.pct}<span style={{fontSize:14}}>%</span></div>
                  <div style={{margin:"8px 0 5px"}}><PBar pct={x.pct} color={x.color} h={5}/></div>
                  <div style={{fontSize:11,color:C.sub}}>{x.items.filter(i=>i.done||i.stage==="회수").length}/{x.items.length}건</div>
                </Card>
              ))}
            </div>
            <Card style={{padding:"16px"}}>
              <div style={{fontSize:14,fontWeight:800,color:C.text,marginBottom:14}}>📍 지역·거래처 현황</div>
              {todayPs.filter(p=>p.category!=="사내방문").map(post=>{
                const {done,total,pct}=calcDone(post); const cc=CAT[post.category]||CAT["일반출하"];
                return(
                  <div key={post.id} onClick={()=>onOpen(post.id)}
                    style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:`1px solid ${C.border}`,cursor:"pointer"}}>
                    <div style={{width:40,height:40,borderRadius:"50%",flexShrink:0,
                      background:pct===100?`${C.done}15`:pct>50?`${C.warn}10`:C.muted,
                      border:`2px solid ${pct===100?C.done:pct>50?C.warn:C.border}`,
                      display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <span style={{fontSize:pct===100?16:11,fontWeight:900,color:pct===100?C.done:pct>50?C.warn:C.sub}}>{pct===100?"✓":pct+"%"}</span>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}>
                        <span style={{fontSize:13,fontWeight:700,color:C.text}}>{post.client}</span>
                        <span style={{background:cc.bg,color:cc.color,fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:10}}>{cc.icon}</span>
                        <UrgBadge urgency={post.urgency}/>
                      </div>
                      <PBar pct={pct} color={pct===100?C.done:cc.color} h={4}/>
                    </div>
                    <span style={{fontSize:11,color:pct===100?C.done:C.sub,fontWeight:700}}>{done}/{total}</span>
                  </div>
                );
              })}
            </Card>
          </>
        )}

        {tab==="내 담당"&&isStaff&&(
          myGroups.length===0
            ?<Card style={{padding:"40px 20px",textAlign:"center"}}><div style={{color:C.sub,fontSize:14}}>오늘 배정된 담당이 없습니다</div></Card>
            :myGroups.map(group=>{
              const cc=CAT[group.category]||CAT["일반출하"];
              const done=group.items.filter(i=>i.done||i.stage==="회수").length;
              const pct=group.items.length?Math.round(done/group.items.length*100):0;
              const unconf=group.items.filter(i=>!i.loc?.confirmed).length;
              return(
                <Card key={group.id} onClick={()=>onOpen(group.postId)} style={{marginBottom:12,cursor:"pointer",WebkitTapHighlightColor:"transparent"}}>
                  <div style={{height:4,background:cc.color}}/>
                  <div style={{padding:"14px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                      <div>
                        <div style={{fontSize:15,fontWeight:800,color:C.text}}>{group.client||group.region}</div>
                        <div style={{fontSize:12,color:cc.color,marginTop:2}}>{cc.icon} {group.category}</div>
                      </div>
                      <div style={{fontSize:26,fontWeight:900,fontFamily:"monospace",color:pct===100?C.done:pct>50?C.warn:C.accent}}>{pct}%</div>
                    </div>
                    {unconf>0&&<div style={{background:`${C.loc}10`,borderRadius:8,padding:"6px 10px",marginBottom:8,fontSize:11,color:C.loc,fontWeight:700}}>📍 위치 미확인 {unconf}건 — 창고 확인 후 출발하세요</div>}
                    <PBar pct={pct} color={cc.color} h={6}/>
                    {group.items.slice(0,2).map(i=>i.loc?.zone&&(
                      <div key={i.id} style={{fontSize:10,color:C.sub,marginTop:4}}>
                        📍 {i.text}: {i.loc.zone}{i.loc.rack?` ${i.loc.rack}`:""}{i.loc.pallet?`-${i.loc.pallet}`:""}
                      </div>
                    ))}
                    <div style={{marginTop:10,padding:"8px 12px",background:C.muted,borderRadius:8,fontSize:12,color:C.accent,textAlign:"center",fontWeight:700}}>탭해서 확인하기 →</div>
                  </div>
                </Card>
              );
            })
        )}

        {tab==="방문기록"&&posts.filter(p=>p.category==="사내방문").sort((a,b)=>b.date.localeCompare(a.date)).map(p=><PostCard key={p.id} post={p} onClick={()=>onOpen(p.id)}/>)}
        {tab==="전체 일정"&&(<>
          <div style={{position:"relative",marginBottom:12}}>
            <input value={vSearch} onChange={e=>setVSearch(e.target.value)}
              placeholder="🔍 업체명 / 거래처 검색"
              style={{width:"100%",background:C.card,border:`1.5px solid ${vSearch?C.accent:C.border}`,borderRadius:12,padding:"11px 42px 11px 16px",fontSize:14,outline:"none",color:C.text,boxSizing:"border-box",boxShadow:C.shadow,transition:"border-color 0.2s"}}/>
            {vSearch&&<button onClick={()=>setVSearch("")} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.sub,fontSize:16,cursor:"pointer",lineHeight:1}}>✕</button>}
          </div>
          {(vSearch.trim()
            ?posts.filter(p=>(p.client||"").includes(vSearch)||(p.requester||"").includes(vSearch)||(p.groups||[]).some(g=>(g.region||"").includes(vSearch)))
            :posts
          ).map(p=><PostCard key={p.id} post={p} onClick={()=>onOpen(p.id)}/>)}
        </>)}
      </div>
    </div>
  );
}

/* ══ 게시글 상세 ══ */
function PostDetail({post,members,user,onBack,onToggle,onAdvanceStage,onAddPhoto,onDelete,onUpdateLoc}){
  const {done,total,pct}=calcDone({...post,groups:post.groups||[],visits:post.visits||[]});
  const cc=CAT[post.category]||CAT["일반출하"];
  const isAdmin=user.role==="admin";
  const isStaff=user.role==="staff";
  const canEdit=isAdmin||isStaff;
  // 안전 기본값: groups가 없을 때 빈 배열로
  const safeGroups=post.groups||[];
  const [viewImg,setViewImg]=useState(null);
  const [confirmDel,setConfirmDel]=useState(false);
  const {ok,missing}=checkQuality(post);

  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      {viewImg&&<ImgModal src={viewImg} onClose={()=>setViewImg(null)}/>}
      {confirmDel&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <Card style={{padding:24,width:"100%",maxWidth:300}}>
            <div style={{fontSize:16,fontWeight:800,color:C.text,marginBottom:8}}>게시글 삭제</div>
            <div style={{fontSize:13,color:C.sub,marginBottom:20}}>이 일정을 삭제할까요?</div>
            <div style={{display:"flex",gap:10}}>
              <Btn onClick={()=>setConfirmDel(false)} color={C.muted} outline style={{flex:1}}>취소</Btn>
              <Btn onClick={()=>{onDelete(post.id);onBack();}} color={C.danger} style={{flex:1}}>삭제</Btn>
            </div>
          </Card>
        </div>
      )}

      <Hdr title={post.category} onBack={onBack}
        right={
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{background:pct===100?`${C.done}15`:`${C.warn}15`,color:pct===100?C.done:C.warn,border:`1px solid ${pct===100?C.done:C.warn}55`,borderRadius:20,padding:"4px 11px",fontSize:12,fontWeight:700}}>{done}/{total}</span>
            {isAdmin&&<Btn onClick={()=>setConfirmDel(true)} color={C.danger} outline small>삭제</Btn>}
          </div>
        }/>

      {!canEdit&&<div style={{background:`${C.accent}08`,borderBottom:`1px solid ${C.accent}22`,padding:"9px 16px",fontSize:11,color:C.accent}}>👁️ 조회 전용 화면</div>}

      <div style={{padding:"14px 14px 80px"}}>
        {/* 헤더 카드 */}
        <Card style={{padding:"16px",marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10,flexWrap:"wrap"}}>
            <span style={{background:cc.bg,color:cc.color,fontSize:12,fontWeight:800,padding:"4px 11px",borderRadius:20}}>{cc.icon} {post.category}</span>
            <UrgBadge urgency={post.urgency}/>
            <QBadge post={post}/>
            <TransBadge transport={post.transport}/>
          </div>
          {post.client&&<div style={{fontSize:20,fontWeight:800,color:C.text,marginBottom:8}}>{post.client}</div>}

          <div style={{background:C.card2,borderRadius:10,padding:"12px",marginBottom:10,border:`1px solid ${C.border}`}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {[
                {l:"의뢰자",v:post.requester||"–"},
                {l:"포장형태",v:post.packaging||"–"},
                {l:"운송방법",v:`${TRANS_ICON[post.transport]||""} ${post.transport||"자차"}`},
                {l:"날짜",v:`${post.date} ${post.time}`},
              ].map(({l,v})=>(
                <div key={l}>
                  <div style={{fontSize:10,color:C.sub,fontWeight:700,marginBottom:2}}>{l}</div>
                  <div style={{fontSize:12,fontWeight:700,color:C.text}}>{v}</div>
                </div>
              ))}
            </div>
            {post.note&&<div style={{marginTop:8,fontSize:12,color:C.sub,borderTop:`1px solid ${C.border}`,paddingTop:8}}>💬 {post.note}</div>}
          </div>

          {!ok&&canEdit&&(
            <div style={{background:`${C.danger}08`,borderRadius:10,padding:"10px 12px",marginBottom:10,border:`1px solid ${C.danger}22`}}>
              <div style={{fontSize:12,fontWeight:700,color:C.danger,marginBottom:4}}>⚠️ 불완전 의뢰서 — 의뢰자에게 확인 필요</div>
              {missing.map(m=><div key={m} style={{fontSize:11,color:C.danger}}>· {m} 누락</div>)}
            </div>
          )}

          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{flex:1}}><PBar pct={pct} color={cc.color} h={8}/></div>
            <span style={{fontSize:15,fontWeight:700,minWidth:44,color:pct===100?C.done:cc.color}}>{pct}%</span>
          </div>
        </Card>

        {/* 첨부사진 */}
        <Card style={{padding:"14px",marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10}}>📎 첨부사진</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {post.photos.map((src,i)=>(
              <div key={i} onClick={()=>setViewImg(src)} style={{width:80,height:80,borderRadius:10,overflow:"hidden",cursor:"pointer",border:`1px solid ${C.border}`,flexShrink:0}}>
                <img src={src} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
              </div>
            ))}
            {canEdit&&<PhotoUpBtn onAdd={url=>onAddPhoto(post.id,null,null,url)}/>}
          </div>
        </Card>

        {/* 그룹별 항목 */}
        {safeGroups.map(group=>{
          const assignedUser=members.find(u=>u.id===group.assignee);
          const canToggle=canEdit&&(isAdmin||(isStaff&&user.id===group.assignee));
          return(
            <Card key={group.id} style={{marginBottom:12}}>
              <div style={{background:C.card2,padding:"12px 14px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:4,height:18,borderRadius:2,background:cc.color}}/>
                <div>
                  <div style={{fontSize:15,fontWeight:800,color:C.text}}>{group.region}</div>
                  {assignedUser&&<div style={{fontSize:11,color:C.sub,marginTop:1}}>담당: <span style={{color:C.general,fontWeight:700}}>{assignedUser.name}</span></div>}
                </div>
              </div>
              {group.items.map((item,idx)=>{
                const isProc=item.hasProc&&item.stage!==null;
                const dl=isProc?daysLeft(item.dueDate):null;
                const over=isProc&&isOD(item.dueDate,item.stage);
                const itemDone=item.stage?"회수"===item.stage:item.done;
                const loc=item.loc;
                return(
                  <div key={item.id} style={{background:itemDone?`${C.done}08`:C.card,padding:"13px 14px",borderBottom:idx<group.items.length-1?`1px solid ${C.border}`:"none"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:4}}>
                          <span style={{fontSize:14,fontWeight:700,color:itemDone?C.sub:C.text,textDecoration:itemDone?"line-through":"none"}}>{item.text}</span>
                          {item.extra&&<span style={{background:`${C.warn}15`,color:C.warn,fontSize:11,fontWeight:700,padding:"1px 6px",borderRadius:5}}>{item.extra}</span>}
                          {item.hasProc&&<span style={{background:`${C.process}12`,color:C.process,fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:5}}>⚙️{item.procType}</span>}
                          <TransBadge transport={item.transport}/>
                        </div>
                        {item.detail&&<div style={{fontSize:11,color:C.sub,fontFamily:"monospace",marginBottom:3}}>{item.detail}</div>}
                        {/* 위치 */}
                        {loc&&(
                          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
                            <LocBadge loc={loc}/>
                            {loc.memo&&<span style={{fontSize:10,color:C.sub}}>{loc.memo}</span>}
                            {!loc.confirmed&&canToggle&&(
                              <button onClick={()=>onUpdateLoc(post.id,item.id,{...loc,confirmed:true})}
                                style={{background:`${C.done}15`,border:`1px solid ${C.done}44`,color:C.done,borderRadius:8,padding:"2px 8px",fontSize:10,fontWeight:700,cursor:"pointer"}}>
                                위치확인 ✓
                              </button>
                            )}
                            {loc.confirmed&&<span style={{fontSize:10,color:C.done,fontWeight:700}}>✓ 확인됨</span>}
                          </div>
                        )}
                        {!isProc&&item.done&&<div style={{fontSize:11,color:C.done}}>✓ {item.doneBy} · {item.doneAt}</div>}
                        {isProc&&(
                          <div>
                            <div style={{fontSize:11,color:over?C.danger:C.sub}}>
                              📅 납기: {item.dueDate}
                              {dl!==null&&item.stage!=="회수"&&<span style={{color:over?C.danger:dl<=2?C.warn:C.done,fontWeight:700,marginLeft:4}}>{over?`⚠️ ${Math.abs(dl)}일 초과`:`D-${dl}`}</span>}
                            </div>
                            <div style={{display:"flex",gap:4,marginTop:6}}>
                              {STAGES.map((s,si)=>{
                                const active=(item.stage?STAGES.indexOf(item.stage):0)>=si;
                                return(
                                  <div key={s} style={{flex:1,textAlign:"center"}}>
                                    <div style={{height:4,background:active?STAGE_COLOR[s]:C.border,borderRadius:99,marginBottom:3,transition:"background 0.3s"}}/>
                                    <div style={{fontSize:9,color:active?STAGE_COLOR[s]:C.dim,fontWeight:700}}>{s}</div>
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        )}
                      </div>
                      {isProc
                        ?<StageBtn item={item} onAdvance={canToggle?()=>onAdvanceStage(post.id,group.id,item.id):null} canEdit={canToggle}/>
                        :<CircleBtn done={item.done} onToggle={canToggle?()=>onToggle(post.id,group.id,item.id):null} size={44}/>
                      }
                    </div>
                    {loc?.photo&&(
                      <div style={{marginTop:8,width:80,height:80,borderRadius:9,overflow:"hidden",border:`1px solid ${C.border}`,cursor:"pointer"}} onClick={()=>setViewImg(loc.photo)}>
                        <img src={loc.photo} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                      </div>
                    )}
                    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
                      {item.photos.map((src,i)=>(
                        <div key={i} onClick={()=>setViewImg(src)} style={{width:58,height:58,borderRadius:8,overflow:"hidden",cursor:"pointer",border:`1px solid ${C.border}`,flexShrink:0}}>
                          <img src={src} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                        </div>
                      ))}
                      {canEdit&&<PhotoUpBtn onAdd={url=>onAddPhoto(post.id,group.id,item.id,url)} small/>}
                    </div>
                  </div>
                );
              })}
            </Card>
          );
        })}
      </div>
    </div>
  );
}

/* ══ 3단계 출하 의뢰 등록 ══ */
function NewPost({members,zones,onBack,onSave}){
  const [step,setStep]=useState(1);
  const [date,setDate]=useState(todayStr());
  const [cat,setCat]=useState("양산출하");
  const [client,setClient]=useState("");
  const [requester,setRequester]=useState("");
  const [urgency,setUrgency]=useState("일반");
  const [packaging,setPackaging]=useState("");
  const [note,setNote]=useState("");
  const [transport,setTransport]=useState("자차");
  const [carNum,setCarNum]=useState("");
  const [photos,setPhotos]=useState([]);
  const [groups,setGroups]=useState([{id:uid(),region:"",assignee:"",items:[newItem()]}]);
  const cc=CAT[cat];
  const inp={background:C.card,border:`1px solid ${C.border}`,borderRadius:9,color:C.text,fontSize:14,padding:"10px 12px",outline:"none",width:"100%",boxSizing:"border-box"};

  const addGroup=()=>setGroups(g=>[...g,{id:uid(),region:"",assignee:"",items:[newItem()]}]);
  const rmGroup=gid=>setGroups(g=>g.filter(x=>x.id!==gid));
  const setReg=(gid,v)=>setGroups(g=>g.map(x=>x.id===gid?{...x,region:v}:x));
  const setAsgn=(gid,v)=>setGroups(g=>g.map(x=>x.id===gid?{...x,assignee:x.assignee===v?"":v}:x));
  const addItm=gid=>setGroups(g=>g.map(x=>x.id===gid?{...x,items:[...x.items,newItem()]}:x));
  const rmItm=(gid,iid)=>setGroups(g=>g.map(x=>x.id===gid?{...x,items:x.items.filter(i=>i.id!==iid)}:x));
  const setItm=(gid,iid,k,v)=>setGroups(g=>g.map(x=>x.id===gid?{...x,items:x.items.map(i=>i.id===iid?{...i,[k]:v}:i)}:x));
  const setLoc=(gid,iid,k,v)=>setGroups(g=>g.map(x=>x.id===gid?{...x,items:x.items.map(i=>i.id===iid?{...i,loc:{...i.loc,[k]:v}}:i)}:x));

  const step1Valid=client.trim()&&requester.trim()&&urgency&&packaging.trim();
  const step2Valid=groups.some(g=>g.items.some(i=>i.text.trim()&&i.detail.trim()));
  const tempPost={category:cat,client,requester,urgency,packaging,groups};
  const {ok:finalOk,missing}=checkQuality(tempPost);

  function save(){
    onSave({
      id:uid(), date, author:"이창용", time:nowTime(),
      category:cat, client:client.trim(), requester:requester.trim(),
      transport, carNum:transport!=="자차"?carNum:"",
      urgency, packaging:packaging.trim(), note:note.trim(), photos, groups, visits:[]
    });
  }

  const stepLabels=["기본 정보","품목 & 위치","최종 확인"];

  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      <Hdr title="출하 의뢰 등록" onBack={onBack}/>

      {/* 단계 바 */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"14px 16px"}}>
        <div style={{display:"flex",gap:0,marginBottom:10}}>

              <div style={{width:28,height:28,borderRadius:"50%",
                background:step>s?C.done:step===s?C.accent:C.border,

              <div style={{fontSize:10,color:step>=s?C.accent:C.sub,fontWeight:step===s?800:400}}>{stepLabels[s-1]}</div>
            </div>
          ))}
        </div>
        <div style={{height:4,background:C.border,borderRadius:99,overflow:"hidden"}}>
          <div style={{width:`${((step-1)/2)*100}%`,height:"100%",background:C.accent,borderRadius:99,transition:"width 0.3s"}}/>
        </div>
      </div>

      <div style={{padding:"16px 16px 100px"}}>
        {/* ─ 단계 1: 기본 정보 ─ */}
        {step===1&&(
          <>
            <div style={{background:`${C.accent}08`,border:`1px solid ${C.accent}30`,borderRadius:12,padding:"12px 14px",marginBottom:16,fontSize:12,color:C.accent,lineHeight:1.8}}>
              📋 출하팀이 즉시 출발할 수 있도록 <strong>모든 필수 항목</strong>을 정확히 입력해 주세요
            </div>
            <Card style={{padding:"16px",marginBottom:14}}>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:12,color:C.sub,fontWeight:700,marginBottom:7}}>날짜</div>
                <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={inp}/>
              </div>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:12,color:C.sub,fontWeight:700,marginBottom:8}}>출하 구분</div>
                <div style={{display:"flex",gap:8}}>
                  {["양산출하","일반출하","사내출하"].map(c=>{ const ccc=CAT[c]||CAT["일반출하"]; const sel=cat===c; return(
                    <button key={c} onClick={()=>setCat(c)} style={{flex:1,padding:"10px 2px",borderRadius:12,fontSize:12,fontWeight:800,border:`2px solid ${sel?ccc.color:C.border}`,background:sel?ccc.bg:C.card2,color:sel?ccc.color:C.sub,cursor:"pointer"}}>
                      {ccc.icon}<br/>{c.replace("출하","")}

                </div>
              </div>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:12,color:C.danger,fontWeight:700,marginBottom:7}}>거래처 *</div>
                <input value={client} onChange={e=>setClient(e.target.value)} placeholder="예: 기아자동차 광주공장" style={inp}/>
              </div>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:12,color:C.danger,fontWeight:700,marginBottom:7}}>의뢰자 * <span style={{color:C.sub,fontWeight:400,fontSize:11}}>(이름+부서 명기)</span></div>
                <input value={requester} onChange={e=>setRequester(e.target.value)} placeholder="예: 생산팀 한상훈" style={inp}/>
              </div>
              <div style={{marginBottom:12}}>

                <div style={{display:"flex",gap:8}}>

              <div style={{marginBottom:12}}>

                      </div>

                          <div><div style={{fontSize:11,color:C.sub,fontWeight:700,marginBottom:5}}>선반 번호</div><input value={item.loc?.rack||""} onChange={e=>setLoc(group.id,item.id,"rack",e.target.value)} placeholder="예: 3-B" style={{...inp,fontSize:12}}/></div>
                          <div><div style={{fontSize:11,color:C.sub,fontWeight:700,marginBottom:5}}>파렛 번호</div><input value={item.loc?.pallet||""} onChange={e=>setLoc(group.id,item.id,"pallet",e.target.value)} placeholder="예: 2" style={{...inp,fontSize:12}}/></div>
                        </div>
                        <input value={item.loc?.memo||""} onChange={e=>setLoc(group.id,item.id,"memo",e.target.value)} placeholder="위치 메모 (예: 파렛 앞줄)" style={{...inp,fontSize:12,marginBottom:8}}/>

                        <div style={{display:"flex",gap:6}}>
                          {item.loc?.photo&&<div style={{width:60,height:60,borderRadius:8,overflow:"hidden",border:`1px solid ${C.border}`}}><img src={item.loc.photo} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>}

                      </div>
                      {/* 공정 */}
                      <div style={{marginTop:10,display:"flex",alignItems:"center",gap:8}}>
                        <button onClick={()=>setItm(group.id,item.id,"hasProc",!item.hasProc)} style={{padding:"5px 12px",borderRadius:20,fontSize:12,fontWeight:700,border:`1.5px solid ${item.hasProc?C.process:C.border}`,background:item.hasProc?`${C.process}12`:C.card,color:item.hasProc?C.process:C.sub,cursor:"pointer"}}>⚙️ 공정 포함</button>
                      </div>
                      {item.hasProc&&(

                          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>
                            {PROC_TYPES.map(pt=>(
                              <button key={pt} onClick={()=>setItm(group.id,item.id,"procType",pt)} style={{padding:"5px 10px",borderRadius:8,fontSize:11,fontWeight:700,border:`1.5px solid ${item.procType===pt?C.process:C.border}`,background:item.procType===pt?`${C.process}12`:C.card2,color:item.procType===pt?C.process:C.sub,cursor:"pointer"}}>{pt}</button>
                            ))}
                          </div>
                          <div style={{fontSize:11,color:C.sub,fontWeight:700,marginBottom:5}}>납기일</div>
                          <input type="date" value={item.dueDate} onChange={e=>setItm(group.id,item.id,"dueDate",e.target.value)} style={{...inp,fontSize:12}}/>
                        </div>
                      )}
                    </div>
                  ))}
                  <button onClick={()=>addItm(group.id)} style={{width:"100%",padding:"10px",borderRadius:10,border:`1.5px dashed ${C.border}`,background:C.card2,color:C.sub,fontSize:13,cursor:"pointer"}}>+ 품목 추가</button>
                </div>
              </Card>
            ))}
            <button onClick={addGroup} style={{width:"100%",padding:"11px",borderRadius:12,border:`2px dashed ${cc.color}88`,background:`${cc.color}08`,color:cc.color,fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:14}}>

          </>

        {/* ─ 단계 3: 최종 확인 ─ */}
        {step===3&&(
          <>
            <Card style={{padding:"16px",marginBottom:14,border:`2px solid ${finalOk?C.done:C.danger}44`}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:finalOk?0:12}}>
                <div style={{fontSize:28}}>{finalOk?"✅":"⚠️"}</div>
                <div>
                  <div style={{fontSize:14,fontWeight:800,color:finalOk?C.done:C.danger}}>{finalOk?"의뢰서 완전 — 출하 진행 가능":"의뢰서 불완전"}</div>

              </div>
              {!finalOk&&missing.map(m=>(
                <div key={m} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",background:`${C.danger}08`,borderRadius:8,marginTop:6}}>
                  <span style={{color:C.danger}}>✗</span>
                  <span style={{fontSize:12,color:C.danger,fontWeight:700}}>{m} 누락</span>
                </div>
              ))}
            </Card>
            <Card style={{padding:"16px",marginBottom:14}}>
              <div style={{fontSize:14,fontWeight:800,color:C.text,marginBottom:14}}>의뢰 요약</div>
              {[
                {l:"출하구분",v:`${cc.icon} ${cat}`},{l:"거래처",v:client},
                {l:"의뢰자",v:requester},{l:"긴급도",v:`${URG_ICON[urgency]} ${urgency}`},

              ))}
              {note&&<div style={{marginTop:8,fontSize:12,color:C.sub,background:C.card2,borderRadius:8,padding:"8px 10px"}}>💬 {note}</div>}
            </Card>
            <Card style={{padding:"14px",marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10}}>품목 & 위치</div>

                    <span style={{fontSize:13,fontWeight:700,color:C.text}}>{item.text}</span>
                    {item.extra&&<span style={{background:`${C.warn}15`,color:C.warn,fontSize:11,fontWeight:700,padding:"1px 6px",borderRadius:5}}>{item.extra}</span>}
                    {item.hasProc&&<span style={{background:`${C.process}12`,color:C.process,fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:5}}>⚙️{item.procType}</span>}
                  </div>
                  {item.detail&&<div style={{fontSize:11,color:C.sub,fontFamily:"monospace"}}>{item.detail}</div>}
                  <div style={{marginTop:4}}><LocBadge loc={item.loc}/></div>
                </div>
              ))}
            </Card>
            <div style={{background:`${C.accent}08`,border:`1px solid ${C.accent}30`,borderRadius:12,padding:"14px",marginBottom:16}}>
              <div style={{fontSize:13,fontWeight:800,color:C.accent,marginBottom:8}}>📌 의뢰자 확인 사항</div>
              {["위 정보는 정확하며, 완제품이 해당 위치에 있음을 확인했습니다","출하 차질 시 즉시 출하팀에 연락하겠습니다","긴급 요청 시 추가 비용이 발생할 수 있음을 인지했습니다"].map((t,i)=>(
                <div key={i} style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:5}}>
                  <span style={{color:C.done,flexShrink:0,marginTop:1}}>✓</span>
                  <span style={{fontSize:12,color:C.sub,lineHeight:1.5}}>{t}</span>

              <Btn onClick={()=>setStep(2)} color={C.muted} outline style={{flex:1}}>← 이전</Btn>

              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

/* ══ 운행 거리 관리 ══ */
function RouteScreen({routes,setRoutes,members,user,onBack}){
  const [selId,setSelId]=useState(null);
  const [showForm,setShowForm]=useState(false);
  const [stopAddr,setStopAddr]=useState("");
  const [stopNote,setStopNote]=useState("");
  const [stopType,setStopType]=useState("경유");
  const [gpsLoading,setGpsLoading]=useState(false);
  const [gpsCoords,setGpsCoords]=useState(null);
  const today=todayStr();
  const inp={background:C.card2,border:`1px solid ${C.border}`,borderRadius:9,color:C.text,fontSize:14,padding:"9px 12px",outline:"none",width:"100%",boxSizing:"border-box"};

  const getKm=route=>{ let k=0; for(let i=1;i<route.stops.length;i++){ const a=route.stops[i-1],b=route.stops[i]; if(a.lat&&b.lat) k+=haversine(a.lat,a.lng,b.lat,b.lng); } return k; };
  const thisMonth=new Date().toISOString().slice(0,7);
  const myRoute=routes.find(r=>r.date===today&&r.staffId===user.id);

  function getGPS(){
    setGpsLoading(true);
    if(!navigator.geolocation){ setGpsLoading(false); alert("이 브라우저는 GPS를 지원하지 않습니다"); return; }
    navigator.geolocation.getCurrentPosition(
      pos=>{ setGpsCoords({lat:pos.coords.latitude,lng:pos.coords.longitude}); setGpsLoading(false); },
      ()=>{ setGpsLoading(false); alert("위치 권한을 허용해 주세요"); }
    );
  }

  function addStop(){
    if(!stopAddr.trim()) return;
    const stop={id:"rs"+uid(),time:nowTime(),address:stopAddr.trim(),lat:gpsCoords?.lat||null,lng:gpsCoords?.lng||null,type:stopType,note:stopNote.trim()};
    if(!myRoute){
      const nr={id:"rt"+uid(),date:today,staffId:user.id,staffName:user.name,status:"진행중",stops:[stop]};
      setRoutes(rs=>[...rs,nr]);
    } else {
      setRoutes(rs=>rs.map(r=>r.id!==myRoute.id?r:{...r,stops:[...r.stops,stop]}));
    }
    setStopAddr(""); setStopNote(""); setGpsCoords(null); setShowForm(false);
  }

  function finishRoute(id){
    setRoutes(rs=>rs.map(r=>r.id!==id?r:{...r,status:"완료"}));
  }

  const staffSummary=members.filter(u=>u.role==="staff").map(u=>{
    const rs=routes.filter(r=>r.staffId===u.id&&r.date.startsWith(thisMonth));
    const km=rs.reduce((a,r)=>a+getKm(r),0);
    const days=new Set(rs.map(r=>r.date)).size;
    return{...u,monthKm:parseFloat(km.toFixed(1)),days,cnt:rs.length};
  });

  const todayRoutes=routes.filter(r=>r.date===today);

  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      <Hdr title="운행 거리 관리" sub="일일 출하 운행 기록" onBack={onBack}/>

      {/* 직원용 오늘 운행 패널 */}
      {user.role==="staff"&&(
        <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"14px 16px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:C.text}}>오늘 내 운행</div>
              <div style={{fontSize:26,fontWeight:900,fontFamily:"monospace",color:C.route,marginTop:2}}>
                {myRoute?getKm(myRoute).toFixed(1):0}<span style={{fontSize:13}}> km</span>
              </div>
              <div style={{fontSize:11,color:C.sub,marginTop:1}}>{myRoute?`${myRoute.stops.length}개 정류장`:"-"}</div>
            </div>
            <div style={{display:"flex",gap:8}}>
              {myRoute?.status==="진행중"&&(
                <button onClick={()=>finishRoute(myRoute.id)} style={{background:`${C.done}15`,color:C.done,border:`1px solid ${C.done}44`,borderRadius:9,padding:"8px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>✓ 완료</button>
              )}
              <button onClick={()=>setShowForm(s=>!s)} style={{background:showForm?C.muted:C.route,color:"#fff",border:"none",borderRadius:9,padding:"8px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
                {showForm?"닫기":"+ 정류장"}
              </button>
            </div>
          </div>

          {showForm&&(
            <div style={{background:C.card2,borderRadius:12,padding:"14px",border:`1px solid ${C.border}`}}>
              <div style={{fontSize:12,color:C.route,fontWeight:700,marginBottom:10}}>🗺️ 정류장 추가</div>
              <div style={{display:"flex",gap:8,marginBottom:10}}>
                {["출발","경유","복귀"].map(t=>(
                  <button key={t} onClick={()=>setStopType(t)} style={{flex:1,padding:"7px 0",borderRadius:8,fontSize:12,fontWeight:700,border:`1.5px solid ${stopType===t?C.route:C.border}`,background:stopType===t?`${C.route}15`:C.card,color:stopType===t?C.route:C.sub,cursor:"pointer"}}>{t}</button>
                ))}
              </div>
              <div style={{marginBottom:8}}><input value={stopAddr} onChange={e=>setStopAddr(e.target.value)} placeholder="목적지 주소 또는 거래처명" style={inp}/></div>
              <div style={{marginBottom:10}}><input value={stopNote} onChange={e=>setStopNote(e.target.value)} placeholder="비고 (예: 브래킷 납품 완료)" style={inp}/></div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={getGPS} style={{flex:1,padding:"9px",borderRadius:9,background:gpsCoords?`${C.done}15`:C.muted,border:`1px solid ${gpsCoords?C.done:C.border}`,color:gpsCoords?C.done:C.sub,fontSize:12,fontWeight:700,cursor:"pointer"}}>
                  {gpsLoading?"확인중...":`📍 ${gpsCoords?"GPS ✓":"GPS 받기"}`}
                </button>
                <button onClick={addStop} style={{flex:2,padding:"9px",borderRadius:9,background:C.route,border:"none",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>저장</button>
              </div>
              {!gpsCoords&&<div style={{fontSize:11,color:C.dim,marginTop:6,textAlign:"center"}}>GPS 없이 저장 시 거리가 0으로 기록됩니다</div>}
            </div>
          )}

          {/* 오늘 정류장 목록 */}
          {myRoute&&myRoute.stops.length>0&&(
            <div style={{marginTop:12}}>
              {myRoute.stops.map((stop,i)=>(
                <div key={stop.id} style={{display:"flex",gap:10,marginBottom:i<myRoute.stops.length-1?6:0}}>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:28}}>
                    <div style={{width:26,height:26,borderRadius:"50%",background:stop.type==="출발"||stop.type==="복귀"?C.route:`${C.route}25`,border:`2px solid ${C.route}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:stop.type==="출발"||stop.type==="복귀"?"#fff":C.route,flexShrink:0}}>
                      {stop.type==="출발"?"S":stop.type==="복귀"?"E":i}
                    </div>
                    {i<myRoute.stops.length-1&&<div style={{width:2,flex:1,background:C.border,minHeight:10,marginTop:3}}/>}
                  </div>
                  <div style={{flex:1,paddingBottom:6}}>
                    <div style={{display:"flex",justifyContent:"space-between"}}>
                      <div style={{fontSize:13,fontWeight:700,color:C.text}}>{stop.address}</div>
                      <div style={{fontSize:11,color:C.sub}}>{stop.time}</div>
                    </div>
                    {stop.note&&<div style={{fontSize:11,color:C.sub}}>{stop.note}</div>}
                    {i>0&&stop.lat&&myRoute.stops[i-1].lat&&(
                      <div style={{fontSize:11,color:C.route}}>📏 {haversine(myRoute.stops[i-1].lat,myRoute.stops[i-1].lng,stop.lat,stop.lng).toFixed(1)}km</div>
                    )}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      <div style={{padding:"14px 14px 100px"}}>
        {/* 이번달 누적 */}
        <Card style={{padding:"16px",marginBottom:14}}>
          <div style={{fontSize:14,fontWeight:800,color:C.text,marginBottom:4}}>📊 이번달 운행 누적</div>
          <div style={{fontSize:11,color:C.sub,marginBottom:14}}>{new Date().getFullYear()}년 {new Date().getMonth()+1}월</div>
          {staffSummary.map(u=>(
            <div key={u.id} style={{background:C.card2,borderRadius:12,padding:"12px 14px",marginBottom:8,border:`1px solid ${C.border}`}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                <Avatar name={u.name} color={u.specialty==="양산"?C.yangsan:C.general} size={34}/>
                <div style={{flex:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <span style={{fontSize:14,fontWeight:700,color:C.text}}>{u.name}</span>
                      <span style={{fontSize:9,marginLeft:6,color:u.specialty==="양산"?C.yangsan:C.general}}>{u.specialty==="양산"?"🏭":"📦"}</span>
                    </div>
                    <div>
                      <span style={{fontSize:20,fontWeight:900,fontFamily:"monospace",color:C.route}}>{u.monthKm}</span>
                      <span style={{fontSize:11,color:C.sub}}> km</span>
                    </div>
                  </div>
                </div>
              </div>
              <div style={{display:"flex",gap:8}}>
                {[{l:"운행일수",v:`${u.days}일`,c:C.route},{l:"출하건수",v:`${u.cnt}건`,c:C.accent},{l:"일평균",v:u.days?`${(u.monthKm/u.days).toFixed(0)}km`:"–",c:C.general}].map(x=>(
                  <div key={x.l} style={{flex:1,background:C.card,borderRadius:8,padding:"6px 0",textAlign:"center",border:`1px solid ${C.border}`}}>
                    <div style={{fontSize:14,fontWeight:800,color:x.c}}>{x.v}</div>
                    <div style={{fontSize:10,color:C.sub,marginTop:1}}>{x.l}</div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </Card>

        {/* 오늘 운행 목록 */}
        <div style={{fontSize:12,color:C.sub,fontWeight:700,marginBottom:10}}>오늘 운행 기록</div>
        {todayRoutes.length===0&&<Card style={{padding:"40px 20px",textAlign:"center"}}><div style={{fontSize:36,marginBottom:10}}>🚗</div><div style={{color:C.sub}}>오늘 운행 기록이 없습니다</div></Card>}
        {todayRoutes.map(route=>{
          const km=getKm(route); const sel=selId===route.id;
          return(
            <Card key={route.id} onClick={()=>setSelId(sel?null:route.id)} style={{marginBottom:10,cursor:"pointer"}}>
              <div style={{height:3,background:C.route}}/>
              <div style={{padding:"13px 14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:14,fontWeight:700,color:C.text}}>{route.staffName}</span>
                      <span style={{background:route.status==="완료"?`${C.done}15`:`${C.warn}15`,color:route.status==="완료"?C.done:C.warn,fontSize:10,fontWeight:800,padding:"2px 7px",borderRadius:10}}>{route.status==="완료"?"✓ 완료":"진행중"}</span>
                    </div>
                    <div style={{fontSize:11,color:C.sub,marginTop:2}}>{route.stops.length}개 정류장</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:24,fontWeight:900,fontFamily:"monospace",color:C.route}}>{km.toFixed(1)}</div>
                    <div style={{fontSize:10,color:C.sub}}>km</div>
                  </div>
                </div>
                {sel&&(
                  <div style={{borderTop:`1px solid ${C.border}`,paddingTop:10}}>
                    {route.stops.map((stop,i)=>(
                      <div key={stop.id} style={{display:"flex",gap:8,marginBottom:i<route.stops.length-1?6:0}}>
                        <div style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:24}}>
                          <div style={{width:22,height:22,borderRadius:"50%",background:stop.type==="출발"||stop.type==="복귀"?C.route:`${C.route}25`,border:`2px solid ${C.route}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,color:stop.type==="출발"||stop.type==="복귀"?"#fff":C.route}}>
                            {stop.type==="출발"?"S":stop.type==="복귀"?"E":i}
                          </div>
                          {i<route.stops.length-1&&<div style={{width:2,flex:1,background:C.border,minHeight:8,marginTop:2}}/>}
                        </div>
                        <div style={{flex:1,paddingBottom:5}}>
                          <div style={{display:"flex",justifyContent:"space-between"}}>
                            <span style={{fontSize:12,fontWeight:700,color:C.text}}>{stop.address}</span>
                            <span style={{fontSize:11,color:C.sub}}>{stop.time}</span>
                          </div>
                          {stop.note&&<div style={{fontSize:11,color:C.sub}}>{stop.note}</div>}
                          {i>0&&stop.lat&&route.stops[i-1].lat&&<div style={{fontSize:11,color:C.route}}>📏 {haversine(route.stops[i-1].lat,route.stops[i-1].lng,stop.lat,stop.lng).toFixed(1)}km</div>}
                        </div>
                      </div>
                    ))}
                    {user.role==="admin"&&route.status==="진행중"&&(
                      <button onClick={e=>{e.stopPropagation();finishRoute(route.id);}} style={{width:"100%",marginTop:8,padding:"9px",borderRadius:9,background:`${C.done}15`,border:`1px solid ${C.done}44`,color:C.done,fontWeight:700,cursor:"pointer",fontSize:12}}>✓ 운행 완료 처리</button>
                    )}
                  </div>
                )}
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}

/* ══ 완제품 위치 현황 ══ */
/* ══ 창고 구역 관리 (관리자 전용) ══ */
function ZoneMgmtModal({zones,onSave,onClose}){
  const [list,setList]=useState([...zones]);
  const [newName,setNewName]=useState("");
  const [editIdx,setEditIdx]=useState(null);
  const [editVal,setEditVal]=useState("");
  const inp={background:C.card,border:`1px solid ${C.border}`,borderRadius:9,color:C.text,fontSize:14,padding:"10px 12px",outline:"none",width:"100%",boxSizing:"border-box"};

  function addZone(){
    const n=newName.trim();
    if(!n||list.includes(n)) return;
    setList(l=>[...l,n]);
    setNewName("");
  }
  function removeZone(i){ setList(l=>l.filter((_,idx)=>idx!==i)); }
  function startEdit(i){ setEditIdx(i); setEditVal(list[i]); }
  function saveEdit(){
    if(!editVal.trim()) return;
    setList(l=>l.map((z,i)=>i===editIdx?editVal.trim():z));
    setEditIdx(null);
  }
  function moveUp(i){ if(i===0) return; setList(l=>{ const a=[...l]; [a[i-1],a[i]]=[a[i],a[i-1]]; return a; }); }
  function moveDown(i){ setList(l=>{ if(i===l.length-1) return l; const a=[...l]; [a[i],a[i+1]]=[a[i+1],a[i]]; return a; }); }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:C.card,borderRadius:18,width:"100%",maxWidth:380,maxHeight:"85vh",display:"flex",flexDirection:"column",boxShadow:"0 8px 32px rgba(0,0,0,0.2)"}}>
        {/* 헤더 */}
        <div style={{padding:"18px 20px 14px",borderBottom:`1px solid ${C.border}`}}>
          <div style={{fontSize:17,fontWeight:800,color:C.text,marginBottom:4}}>🏢 창고 구역 관리</div>
          <div style={{fontSize:12,color:C.sub}}>구역명을 추가·수정·삭제·순서 변경할 수 있습니다</div>
        </div>

        {/* 구역 목록 */}
        <div style={{flex:1,overflowY:"auto",padding:"14px 16px"}}>
          {list.map((zone,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",marginBottom:8,background:C.card2,borderRadius:10,border:`1px solid ${C.border}`}}>
              {/* 순서 이동 */}
              <div style={{display:"flex",flexDirection:"column",gap:2}}>
                <button onClick={()=>moveUp(i)} disabled={i===0}
                  style={{background:"none",border:"none",color:i===0?C.dim:C.sub,fontSize:12,cursor:i===0?"default":"pointer",padding:"0 4px",lineHeight:1}}>▲</button>
                <button onClick={()=>moveDown(i)} disabled={i===list.length-1}
                  style={{background:"none",border:"none",color:i===list.length-1?C.dim:C.sub,fontSize:12,cursor:i===list.length-1?"default":"pointer",padding:"0 4px",lineHeight:1}}>▼</button>
              </div>

              {/* 구역명 — 편집 중이면 input, 아니면 텍스트 */}
              {editIdx===i ? (
                <input value={editVal} onChange={e=>setEditVal(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&saveEdit()}
                  autoFocus
                  style={{...inp,flex:1,padding:"6px 10px",fontSize:13}}/>
              ) : (
                <div style={{flex:1,fontSize:14,fontWeight:700,color:C.text}}>{zone}</div>
              )}

              {/* 버튼 */}
              <div style={{display:"flex",gap:5,flexShrink:0}}>
                {editIdx===i ? (
                  <>
                    <button onClick={saveEdit}
                      style={{background:C.done,border:"none",color:"#fff",borderRadius:7,padding:"5px 10px",fontSize:12,fontWeight:700,cursor:"pointer"}}>✓</button>
                    <button onClick={()=>setEditIdx(null)}
                      style={{background:C.muted,border:"none",color:C.sub,borderRadius:7,padding:"5px 8px",fontSize:12,cursor:"pointer"}}>✕</button>
                  </>
                ) : (
                  <>
                    <button onClick={()=>startEdit(i)}
                      style={{background:`${C.accent}15`,border:`1px solid ${C.accent}33`,color:C.accent,borderRadius:7,padding:"5px 10px",fontSize:12,fontWeight:700,cursor:"pointer"}}>수정</button>
                    <button onClick={()=>removeZone(i)}
                      style={{background:`${C.danger}10`,border:`1px solid ${C.danger}33`,color:C.danger,borderRadius:7,padding:"5px 10px",fontSize:12,fontWeight:700,cursor:"pointer"}}>삭제</button>
                  </>
                )}
              </div>
            </div>
          ))}

          {/* 새 구역 추가 */}
          <div style={{display:"flex",gap:8,marginTop:12}}>
            <input value={newName} onChange={e=>setNewName(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&addZone()}
              placeholder="새 구역명 입력 (예: 완제품창고)"
              style={{...inp,flex:1}}/>
            <button onClick={addZone}
              style={{background:C.accent,border:"none",color:"#fff",borderRadius:9,padding:"10px 16px",fontSize:14,fontWeight:700,cursor:"pointer",flexShrink:0}}>추가</button>
          </div>

          <div style={{marginTop:10,fontSize:11,color:C.sub,lineHeight:1.6}}>
            💡 구역명 변경 시 기존 등록된 품목의 위치 표시도 함께 변경됩니다.
          </div>
        </div>

        {/* 하단 버튼 */}
        <div style={{padding:"14px 16px",borderTop:`1px solid ${C.border}`,display:"flex",gap:10}}>
          <button onClick={onClose}
            style={{flex:1,padding:"12px",borderRadius:10,background:C.muted,border:"none",color:C.sub,fontWeight:700,cursor:"pointer",fontSize:14}}>취소</button>
          <button onClick={()=>{ onSave(list); onClose(); }}
            style={{flex:2,padding:"12px",borderRadius:10,background:C.accent,border:"none",color:"#fff",fontWeight:800,cursor:"pointer",fontSize:14,boxShadow:`0 3px 12px ${C.accent}44`}}>
            저장
          </button>
        </div>
      </div>
    </div>
  );
}

function LocationScreen({posts,user,zones,onUpdateLoc,onUpdateItemText,onBack}){
  const [selZone,setSelZone]=useState("전체");
  const [search,setSearch]=useState("");
  const [editing,setEditing]=useState(null);
  const [eZone,setEZone]=useState("A창고");
  const [eRack,setERack]=useState("");
  const [ePallet,setEPallet]=useState("");
  const [eMemo,setEMemo]=useState("");
  const [eConfirmed,setEConfirmed]=useState(false);

  const inp={background:C.card,border:`1px solid ${C.border}`,borderRadius:9,color:C.text,fontSize:14,padding:"10px 12px",outline:"none",width:"100%",boxSizing:"border-box"};

  function openEdit(item){
    const loc=item.loc||{};
    setEditing({postId:item.postId,itemId:item.id,itemName:item.text,detail:item.detail});
    setEZone(loc.zone||"A창고");
    setERack(loc.rack||"");
    setEPallet(loc.pallet||"");
    setEMemo(loc.memo||"");
    setEConfirmed(loc.confirmed||false);
  }

  function saveEdit(){
    if(!editing) return;
    // 위치 저장
    onUpdateLoc(editing.postId,editing.itemId,{
      zone:eZone, rack:eRack.trim(), pallet:ePallet.trim(),
      memo:eMemo.trim(), confirmed:eConfirmed, photo:null
    });
    // 관리자는 품목명도 저장
    if(user?.role==="admin"&&editing.itemName.trim()){
      onUpdateItemText(editing.postId,editing.itemId,editing.itemName.trim());
    }
    setEditing(null);
  }

  const allItems=posts.filter(p=>p.category!=="사내방문").flatMap(p=>
    p.groups.flatMap(g=>g.items.map(i=>({...i,postId:p.id,client:p.client,category:p.category,region:g.region})))
  ).filter(i=>!i.done&&i.stage!=="회수");

  const filtered=allItems.filter(i=>{
    const zoneOk=selZone==="전체"||i.loc?.zone===selZone;
    const searchOk=!search||(i.text+i.detail).toLowerCase().includes(search.toLowerCase());
    return zoneOk&&searchOk;
  });

  return(
    <div style={{minHeight:"100vh",background:C.bg}}>

      {/* 위치 편집 모달 */}
      {editing&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>

                <div style={{fontSize:11,color:C.sub,marginBottom:8}}>거래처: {item.client} · {item.region}</div>

                <div style={{background:`${C.loc}08`,borderRadius:10,padding:"10px 12px",border:`1px solid ${C.loc}33`}}>

                  {!confirmed&&(

    </div>
  );
}

/* ══ 사내방문 기록 ══ */
function VisitLog({post,user,onBack,onAddVisit,onAddVisitPhoto}){

  function submit(){
    if(!vName.trim()||!vItems.trim()) return;
    onAddVisit(post.id,{id:"v"+uid(),visitorName:vName.trim(),dept:vDept.trim(),items:vItems.trim(),purpose:vPurpose.trim(),transport:vTrans,carNum:vTrans==="용차"?vCar.trim():"",recordedBy:user.name,recordedAt:fmtDT(),photos:[]});

            <div style={{display:"flex",gap:8,marginBottom:vTrans==="용차"?8:0}}>

                <div style={{fontSize:10,color:C.visit,fontWeight:700,marginBottom:3}}>📦 가져간 품목</div>
                <div style={{fontSize:14,fontWeight:700,color:C.text}}>{v.items}</div>
              </div>
              {v.purpose&&<div style={{background:C.card2,borderRadius:10,padding:"8px 12px",marginTop:6,border:`1px solid ${C.border}`}}><div style={{fontSize:10,color:C.sub,fontWeight:700,marginBottom:2}}>목적</div><div style={{fontSize:13,color:C.text}}>{v.purpose}</div></div>}
              <div style={{display:"flex",gap:8,marginTop:10,alignItems:"center"}}>
                <span style={{background:v.transport==="용차"?`${C.warn}15`:v.transport==="퀵"?`${C.quick}15`:`${C.done}10`,color:v.transport==="용차"?C.warn:v.transport==="퀵"?C.quick:C.done,border:`1px solid ${v.transport==="용차"?C.warn:v.transport==="퀵"?C.quick:C.done}44`,fontSize:11,fontWeight:800,padding:"3px 10px",borderRadius:20}}>
                  {TRANS_ICON[v.transport]||"🚶"} {v.transport==="직접"?"직접 수령":v.transport}

              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:10}}>
                {v.photos.map((src,i)=>(

  );

/* ══ 팀원·승인 관리 ══ */
function UserMgmt({members,pending,onBack,onSaveMbr,onApprove,onReject}){
  const [tab,setTab]=useState(pending.length>0?"승인":"팀원");
  const [list,setList]=useState(members);
  const [ed,setEd]=useState(null); const [isNew,setIsNew]=useState(false);
  const [fName,setFName]=useState(""); const [fDept,setFDept]=useState("");
  const [fRegion,setFRegion]=useState(""); const [fRole,setFRole]=useState("staff"); const [fSpec,setFSpec]=useState("일반");
  const inp={background:C.card,border:`1px solid ${C.border}`,borderRadius:9,color:C.text,fontSize:14,padding:"10px 12px",outline:"none",width:"100%",boxSizing:"border-box"};
  const ROLE_META2={admin:{label:"관리자",color:C.accent,icon:"👑"},staff:{label:"출하팀",color:C.general,icon:"👷"},viewer:{label:"조회",color:C.done,icon:"👁️"}};
  const [fPw,setFPw]=useState("");
  const [fPermReg,setFPermReg]=useState(false);
  const [fPermShip,setFPermShip]=useState(false);
  function openEd(u){
    setEd(u); setIsNew(false); setFName(u.name); setFDept(u.dept||"");
    setFRegion(u.region||""); setFRole(u.role); setFSpec(u.specialty||"일반");
    setFPw(u.password||"");
    setFPermReg(u.permissions?.canRegister||false);
    setFPermShip(u.permissions?.canInternalShip||false);
  }
  function openNew(){
    setEd({id:uidS()}); setIsNew(true); setFName(""); setFDept("");
    setFRegion(""); setFRole("staff"); setFSpec("일반"); setFPw("");
    setFPermReg(false); setFPermShip(false);
  }
  function saveEd(){
    if(!fName.trim()) return;
    const role=ed.role==="admin"?"admin":fRole;
    const u={
      ...ed,
      name:fName.trim(), dept:fDept.trim(),
      region:role==="viewer"?null:fRegion.trim()||null,
      role, specialty:role==="staff"?fSpec:null,
      password:fPw.trim(),
      permissions:{
        canRegister: role==="admin"?true:fPermReg,
        canInternalShip: role==="admin"?true:fPermShip,
      }
    };
    const newList=isNew?[...list,u]:list.map(x=>x.id===u.id?u:x);
    setList(newList);
    onSaveMbr(newList);
    setEd(null);
  }
  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      <Hdr title="팀원 관리" onBack={()=>{ onSaveMbr(list); onBack(); }} right={<button onClick={openNew} style={{background:C.accent,color:"#fff",border:"none",borderRadius:9,padding:"7px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>+ 추가</button>}/>
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,display:"flex"}}>
        {["승인","팀원"].map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"13px 0",background:"none",border:"none",borderBottom:`3px solid ${tab===t?C.accent:"transparent"}`,color:tab===t?C.accent:C.sub,fontSize:14,fontWeight:700,cursor:"pointer",position:"relative"}}>
            {t}{t==="승인"&&pending.length>0&&<span style={{position:"absolute",top:8,right:"22%",background:C.danger,color:"#fff",fontSize:10,fontWeight:800,borderRadius:8,padding:"1px 5px"}}>{pending.length}</span>}
          </button>
        ))}
      </div>
      {ed&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <Card style={{padding:22,width:"100%",maxWidth:340}}>
            <div style={{fontSize:17,fontWeight:800,color:C.text,marginBottom:18}}>{isNew?"팀원 추가":"팀원 수정"}</div>
            {/* 관리자는 역할 고정, 나머지는 선택 가능 */}
            {ed.role==="admin" ? (
              <div style={{marginBottom:12}}>
                <div style={{fontSize:12,color:C.sub,fontWeight:700,marginBottom:8}}>역할</div>
                <div style={{background:`${C.accent}10`,border:`1px solid ${C.accent}33`,borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",gap:8}}>
