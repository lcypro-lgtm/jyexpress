<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>지용금속</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#F2F4F8;font-family:-apple-system,sans-serif;}
    #root{min-height:100vh;padding:20px;}
    .error{background:#d32f2f;color:#fff;padding:15px;margin:10px;border-radius:8px;font-size:13px;}
    .success{background:#4caf50;color:#fff;padding:10px;margin:10px;border-radius:8px;}
  </style>
</head>
<body>
  <div id="root">
    <h2>지용금속 출하관리 - 로딩 중...</h2>
    <div id="status"></div>
  </div>
  
  <script>
    const status = document.getElementById('status');
    function log(msg, isError) {
      const div = document.createElement('div');
      div.className = isError ? 'error' : 'success';
      div.textContent = msg;
      status.appendChild(div);
    }
    
    window.onerror = (msg, src, line) => {
      log('오류: ' + msg + ' (Line: ' + line + ')', true);
      return false;
    };
  </script>
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js" onload="log('✓ Firebase SDK 로드됨')" onerror="log('✗ Firebase SDK 로드 실패', true)"></script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" onload="log('✓ React 로드됨')" onerror="log('✗ React 로드 실패', true)"></script>
