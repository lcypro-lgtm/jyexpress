            <div style={{marginBottom:12}}><div style={{fontSize:12,color:C.sub,fontWeight:700,marginBottom:6}}>이름 *</div><input value={fName} onChange={e=>setFName(e.target.value)} style={inp}/></div>
            <div style={{marginBottom:12}}><div style={{fontSize:12,color:C.sub,fontWeight:700,marginBottom:6}}>부서</div><input value={fDept} onChange={e=>setFDept(e.target.value)} placeholder="출하팀" style={inp}/></div>
            {fRole==="staff"&&<div style={{marginBottom:12}}><div style={{fontSize:12,color:C.sub,fontWeight:700,marginBottom:6}}>담당 구역</div><input value={fRegion} onChange={e=>setFRegion(e.target.value)} style={inp}/></div>}

            {/* 비밀번호 설정 — 필수 */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:C.danger,fontWeight:700,marginBottom:6}}>
                🔒 비밀번호 * <span style={{fontWeight:400,fontSize:11,color:C.sub}}>(반드시 설정해야 접속 가능)</span>
              </div>
              <input type="text" value={fPw} onChange={e=>setFPw(e.target.value)}
                placeholder="비밀번호 입력 (필수)"
                style={{...inp, border:`1.5px solid ${fPw.trim()?C.done:C.danger}`}}/>
              {!fPw.trim()&&(
                <div style={{fontSize:11,color:C.danger,marginTop:4}}>
                  ⚠️ 비밀번호를 설정하지 않으면 해당 사용자는 로그인할 수 없습니다
                </div>
              )}
            </div>

            {/* 권한 설정 — 관리자가 아닌 경우만 */}
            {ed.role!=="admin"&&(
              <div style={{marginBottom:16}}>
                <div style={{fontSize:12,color:C.sub,fontWeight:700,marginBottom:8}}>🛡️ 추가 권한 부여</div>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  <div onClick={()=>setFPermReg(v=>!v)}
                    style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",
                      background:fPermReg?`${C.accent}08`:C.card2,
                      border:`1.5px solid ${fPermReg?C.accent:C.border}`,
                      borderRadius:10,cursor:"pointer"}}>
                    <div style={{width:22,height:22,borderRadius:"50%",
                      background:fPermReg?C.accent:C.muted,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:12,color:"#fff",flexShrink:0}}>
                      {fPermReg?"✓":""}
                    </div>
                    <div>
                      <div style={{fontSize:13,fontWeight:700,color:fPermReg?C.accent:C.text}}>출하 의뢰 등록</div>
                      <div style={{fontSize:11,color:C.sub}}>출하일정 직접 등록 가능</div>
                    </div>
                  </div>
                  <div onClick={()=>setFPermShip(v=>!v)}
                    style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",
                      background:fPermShip?`${C.process}08`:C.card2,
                      border:`1.5px solid ${fPermShip?C.process:C.border}`,
                      borderRadius:10,cursor:"pointer"}}>
                    <div style={{width:22,height:22,borderRadius:"50%",
                      background:fPermShip?C.process:C.muted,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:12,color:"#fff",flexShrink:0}}>
                      {fPermShip?"✓":""}
                    </div>
                    <div>
                      <div style={{fontSize:13,fontWeight:700,color:fPermShip?C.process:C.text}}>사내출하 등록</div>
                      <div style={{fontSize:11,color:C.sub}}>사내출하 직접 등록 가능</div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            <div style={{display:"flex",gap:10}}>
              <Btn onClick={()=>setEd(null)} color={C.muted} outline style={{flex:1}}>취소</Btn>
              <Btn onClick={saveEd} style={{flex:1}}>{isNew?"추가":"저장"}</Btn>
            </div>
          </Card>
        </div>
      )}
      <div style={{padding:"14px 14px 100px"}}>
        {tab==="승인"&&(
          pending.length===0
            ?<Card style={{padding:"40px 20px",textAlign:"center"}}><div style={{fontSize:40,marginBottom:10}}>✅</div><div style={{color:C.sub,fontSize:14}}>대기 중인 신청이 없습니다</div></Card>
            :pending.map(p=>(
              <Card key={p.id} style={{padding:"16px",marginBottom:12,border:`2px solid #AF52DE33`}}>
                <div style={{display:"flex",gap:12,marginBottom:14}}>
                  <Avatar name={p.name} color="#AF52DE" size={46}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:16,fontWeight:800,color:C.text}}>{p.name}</div>
                    <div style={{fontSize:12,color:C.accent,marginTop:2}}>{p.dept}</div>
                    {p.purpose&&<div style={{fontSize:11,color:C.sub,marginTop:3}}>목적: {p.purpose}</div>}
                    <div style={{fontSize:11,color:C.dim,marginTop:2}}>{p.requestedAt}</div>
                  </div>
                </div>
                <div style={{display:"flex",gap:10}}>
                  <Btn onClick={()=>onReject(p.id)} color={C.danger} outline style={{flex:1}}>✕ 거부</Btn>
                  <Btn onClick={()=>onApprove(p)} color={C.done} style={{flex:2}}>✓ 승인</Btn>
                </div>
              </Card>
            ))
        )}
        {tab==="팀원"&&(
          <>
            {["admin","staff","viewer"].map(role=>{
              const rm=ROLE_META2[role]; const users=list.filter(u=>u.role===role);
              return(
                <div key={role} style={{marginBottom:20}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                    <div style={{height:1,flex:1,background:C.border}}/>
                    <span style={{fontSize:11,color:C.sub,fontWeight:700}}>{rm.icon} {rm.label} ({users.length})</span>
                    <div style={{height:1,flex:1,background:C.border}}/>
                  </div>
                  {users.map(u=>(
                    <Card key={u.id} style={{padding:"13px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:12}}>
                      <Avatar name={u.name} color={rm.color} size={40}/>
                      <div style={{flex:1}}>
                        <div style={{fontSize:14,fontWeight:700,color:C.text}}>{u.name}</div>
                        <div style={{fontSize:11,color:C.sub,marginTop:2}}>
                          {u.dept}{u.region&&<span> · {u.region}</span>}
                          {u.specialty&&<span style={{marginLeft:6,background:u.specialty==="양산"?`${C.yangsan}15`:`${C.general}15`,color:u.specialty==="양산"?C.yangsan:C.general,fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:8}}>{u.specialty==="양산"?"🏭 양산":"📦 일반"}</span>}
                        </div>
                        <div style={{display:"flex",gap:4,marginTop:4,flexWrap:"wrap"}}>
                          {u.password?<span style={{background:`${C.done}15`,color:C.done,fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:6}}>🔒 설정됨</span>:<span style={{background:`${C.danger}15`,color:C.danger,fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:6}}>⚠ 미설정</span>}
                        </div>

                        {u.role!=="admin"&&<Btn onClick={()=>setList(l=>l.filter(x=>x.id!==u.id))} color={C.danger} outline small>삭제</Btn>}
                      </div>

              );
            })}
            <button onClick={()=>{ onSaveMbr(list); onBack(); }} style={{width:"100%",padding:"14px 0",borderRadius:14,background:`linear-gradient(135deg,${C.accentL},${C.accent})`,color:"#fff",border:"none",fontSize:16,fontWeight:800,cursor:"pointer",boxShadow:"0 4px 14px rgba(18,89,195,0.35)"}}>✓ 저장</button>
          </>
        )}
      </div>
    </div>
  );
}

/* ══ 통계 화면 ══ */
function StatsScreen({posts,routes,members,onBack}){
  const [period,setPeriod]=useState(7);
  const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-period);
  const filtered=posts.filter(p=>new Date(p.date)>=cutoff);
  const thisMonth=new Date().toISOString().slice(0,7);
  const allItems=filtered.filter(p=>p.category!=="사내방문").flatMap(p=>p.groups.flatMap(g=>g.items));
  const allVisits=filtered.filter(p=>p.category==="사내방문").flatMap(p=>p.visits||[]);
  const freq=(arr,key)=>{ const f={}; arr.forEach(x=>{ const k=key(x); if(k) f[k]=(f[k]||0)+1; }); return Object.entries(f).sort((a,b)=>b[1]-a[1]); };
  const clientRank=freq(filtered.filter(p=>p.client),p=>p.client);
  const procRank=freq(allItems.filter(i=>i.hasProc&&i.procType),i=>i.procType);
  const transRank=freq(allItems,i=>i.transport||"자차");
  const transFreq=Object.fromEntries(transRank);
  const totalTrans=allItems.length||1;

  const getKm=route=>{ let k=0; for(let i=1;i<route.stops.length;i++){ const a=route.stops[i-1],b=route.stops[i]; if(a.lat&&b.lat) k+=haversine(a.lat,a.lng,b.lat,b.lng); } return k; };

  const staffStats=members.filter(u=>u.role==="staff").map(u=>{
    const its=filtered.filter(p=>p.category!=="사내방문").flatMap(p=>p.groups.filter(g=>g.assignee===u.id).flatMap(g=>g.items));
    const vts=filtered.filter(p=>p.category==="사내방문").flatMap(p=>(p.visits||[]).filter(v=>v.recordedBy===u.name));
    const mRoutes=routes.filter(r=>r.staffId===u.id&&r.date.startsWith(thisMonth));
    const km=mRoutes.reduce((a,r)=>a+getKm(r),0);
    return{...u,itemCnt:its.length,visitCnt:vts.length,monthKm:parseFloat(km.toFixed(1)),total:its.length+vts.length};
  }).sort((a,b)=>b.total-a.total);
  const maxLoad=Math.max(...staffStats.map(s=>s.total),1);

  const catFreq={양산출하:filtered.filter(p=>p.category==="양산출하").length,일반출하:filtered.filter(p=>p.category==="일반출하").length,사내방문:allVisits.length};
  const totalPosts=filtered.length||1;

  const days7=Array.from({length:7},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-6+i); return d.toISOString().slice(0,10); });
  const dayData=days7.map(d=>({
    date:d.slice(5).replace("-","/"),
    yangsan:posts.filter(p=>p.date===d&&p.category==="양산출하").length,
    general:posts.filter(p=>p.date===d&&p.category==="일반출하").length,
    visit:posts.filter(p=>p.date===d&&p.category==="사내방문").reduce((a,p)=>a+(p.visits||[]).length,0),
    isToday:d===todayStr(),
  }));

  function RR({rank,name,cnt,max,color}){
    return(
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:`1px solid ${C.border}`}}>
        <div style={{width:26,height:26,borderRadius:8,background:rank===1?C.accent:rank===2?`${C.accent}70`:C.muted,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:rank<=2?"#fff":C.sub,flexShrink:0}}>{rank}</div>
        <div style={{flex:1,fontSize:13,fontWeight:600,color:C.text}}>{name}</div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:70,height:6,background:C.border,borderRadius:99,overflow:"hidden"}}>
            <div style={{width:`${Math.round(cnt/max*100)}%`,height:"100%",background:color,borderRadius:99}}/>
          </div>
          <span style={{fontSize:13,fontWeight:800,color,minWidth:28,textAlign:"right"}}>{cnt}</span>
        </div>
      </div>
    );
  }

  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      <Hdr title="업무 분석 통계" sub="업무 재분배 의사결정 도구" onBack={onBack}/>
      <div style={{padding:"14px 14px 100px"}}>
        <div style={{display:"flex",gap:6,marginBottom:16,background:C.card,borderRadius:12,padding:4,boxShadow:C.shadow}}>
          {[7,14,30].map(d=><button key={d} onClick={()=>setPeriod(d)} style={{flex:1,padding:"9px 0",borderRadius:9,fontSize:13,fontWeight:700,border:"none",background:period===d?C.accent:C.card,color:period===d?"#fff":C.sub,cursor:"pointer",transition:"all 0.15s"}}>최근 {d}일</button>)}
        </div>

        {/* 유형 비중 */}
        <Card style={{padding:"16px",marginBottom:14}}>
          <div style={{fontSize:14,fontWeight:800,color:C.text,marginBottom:14}}>📊 출하 유형 비중</div>
          {[{l:"양산출하",c:C.yangsan,cnt:catFreq["양산출하"]},{l:"일반출하",c:C.general,cnt:catFreq["일반출하"]},{l:"사내방문",c:C.visit,cnt:allVisits.length}].map(({l,c,cnt})=>{
            const pct=Math.round(cnt/totalPosts*100);
            return(<div key={l} style={{marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:13,fontWeight:700,color:c}}>{l}</span><span style={{fontSize:13,fontWeight:700,color:c}}>{cnt}건 <span style={{color:C.sub,fontSize:11}}>({pct}%)</span></span></div><PBar pct={pct} color={c} h={10}/></div>);
          })}
        </Card>

        {/* 일별 트렌드 */}
        <Card style={{padding:"16px",marginBottom:14}}>
          <div style={{fontSize:14,fontWeight:800,color:C.text,marginBottom:14}}>📈 일별 출하 트렌드</div>
          <div style={{display:"flex",gap:5,alignItems:"flex-end",height:100}}>
            {dayData.map(d=>{
              const mx=Math.max(...dayData.map(x=>x.yangsan+x.general+x.visit),1);
              const tot=d.yangsan+d.general+d.visit;
              const h=Math.max(Math.round(tot/mx*80),tot>0?4:2);
              const yh=tot?Math.round(d.yangsan/tot*h):0;
              const gh=tot?Math.round(d.general/tot*h):0;
              const vh=h-yh-gh;
              return(
                <div key={d.date} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                  <div style={{fontSize:10,color:tot>0?C.text:C.dim,fontWeight:700}}>{tot||""}</div>
                  <div style={{width:"75%",display:"flex",flexDirection:"column",justifyContent:"flex-end",height:80,borderRadius:"4px 4px 0 0",overflow:"hidden"}}>
                    {d.visit>0&&<div style={{width:"100%",height:`${vh}px`,background:C.visit}}/>}
                    {d.general>0&&<div style={{width:"100%",height:`${gh}px`,background:C.general}}/>}
                    {d.yangsan>0&&<div style={{width:"100%",height:`${yh}px`,background:C.yangsan}}/>}
                    {tot===0&&<div style={{width:"100%",height:"3px",background:C.border}}/>}
                  </div>
                  <div style={{fontSize:9,color:d.isToday?C.accent:C.sub,fontWeight:d.isToday?800:400}}>{d.date}</div>
                </div>
              );
            })}
          </div>
          <div style={{display:"flex",gap:14,marginTop:10,justifyContent:"center"}}>
            {[{c:C.yangsan,l:"양산"},{c:C.general,l:"일반"},{c:C.visit,l:"방문"}].map(x=>(
              <div key={x.l} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:10,height:10,borderRadius:2,background:x.c}}/><span style={{fontSize:11,color:C.sub}}>{x.l}</span></div>
            ))}
          </div>
        </Card>

        {/* 직원 업무 부하 */}
        <Card style={{padding:"16px",marginBottom:14}}>
          <div style={{fontSize:14,fontWeight:800,color:C.text,marginBottom:4}}>⚖️ 직원별 업무 부하</div>
          <div style={{fontSize:12,color:C.sub,marginBottom:14}}>업무 재분배 판단 기준 · 이번달 운행 포함</div>
          {staffStats.map((u,i)=>(
            <div key={u.id} style={{background:C.card2,borderRadius:12,padding:"12px 14px",marginBottom:8,border:i===0&&u.total>5?`1px solid ${C.danger}44`:`1px solid ${C.border}`}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                <Avatar name={u.name} color={u.specialty==="양산"?C.yangsan:C.general} size={34}/>
                <div style={{flex:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <span style={{fontSize:14,fontWeight:700,color:C.text}}>{u.name}</span>
                      <span style={{fontSize:9,marginLeft:6,color:u.specialty==="양산"?C.yangsan:C.general,fontWeight:700,padding:"1px 5px",borderRadius:5,background:u.specialty==="양산"?`${C.yangsan}15`:`${C.general}15`}}>{u.specialty==="양산"?"🏭":"📦"}</span>
                    </div>
                    <span style={{fontSize:14,fontWeight:800,color:u.total>5?C.danger:u.total>3?C.warn:C.done}}>{u.total}건</span>
                  </div>
                </div>
              </div>
              <PBar pct={Math.round(u.total/maxLoad*100)} color={u.total>5?C.danger:u.total>3?C.warn:C.done} h={6}/>
              <div style={{display:"flex",gap:8,marginTop:10}}>
                {[{l:"출하",v:u.itemCnt,c:C.accent},{l:"방문기록",v:u.visitCnt,c:C.visit},{l:"이번달운행",v:`${u.monthKm}km`,c:C.route}].map(x=>(
                  <div key={x.l} style={{flex:1,background:C.card,borderRadius:8,padding:"6px 0",textAlign:"center",border:`1px solid ${C.border}`}}>
                    <div style={{fontSize:12,fontWeight:800,color:x.c}}>{x.v}</div>
                    <div style={{fontSize:10,color:C.sub,marginTop:1}}>{x.l}</div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </Card>

        <Card style={{padding:"16px",marginBottom:14}}>
          <div style={{fontSize:14,fontWeight:800,color:C.text,marginBottom:14}}>🏢 거래처 출하 빈도</div>
          {clientRank.length===0?<div style={{color:C.sub,fontSize:13}}>데이터 없음</div>:clientRank.map(([n,c],i)=><RR key={n} rank={i+1} name={n} cnt={c} max={clientRank[0][1]} color={C.accent}/>)}
        </Card>

        <Card style={{padding:"16px",marginBottom:14}}>
          <div style={{fontSize:14,fontWeight:800,color:C.text,marginBottom:14}}>⚙️ 공정 의뢰 빈도</div>
          {procRank.length===0?<div style={{color:C.sub,fontSize:13}}>공정 의뢰 없음</div>:procRank.map(([n,c],i)=><RR key={n} rank={i+1} name={n} cnt={c} max={procRank[0][1]} color={C.process}/>)}
        </Card>

        <Card style={{padding:"16px",marginBottom:14}}>
          <div style={{fontSize:14,fontWeight:800,color:C.text,marginBottom:14}}>🚐 외부자원 활용 현황</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {transRank.map(([t,cnt])=>{ const color=TRANS_COLOR[t]||C.dim; return(
              <div key={t} style={{background:C.card2,border:`1px solid ${color}33`,borderRadius:12,padding:"14px",textAlign:"center"}}>
                <div style={{fontSize:26}}>{TRANS_ICON[t]||"📦"}</div>
                <div style={{fontSize:22,fontWeight:900,fontFamily:"monospace",color,marginTop:4}}>{cnt}</div>
                <div style={{fontSize:11,color,fontWeight:700,marginTop:2}}>{t}</div>
                <div style={{fontSize:10,color:C.sub}}>{Math.round(cnt/totalTrans*100)}%</div>
              </div>
            );})}
          </div>
        </Card>

        <Card style={{padding:"16px"}}>
          <div style={{fontSize:14,fontWeight:800,color:C.accent,marginBottom:12}}>💡 업무 재분배 시사점</div>
          {staffStats[0]?.total>staffStats[staffStats.length-1]?.total*1.5&&(
            <div style={{background:`${C.danger}08`,borderRadius:10,padding:"11px 13px",marginBottom:8,border:`1px solid ${C.danger}22`}}>
              <span style={{fontSize:12,color:C.danger}}>⚠️ <strong>{staffStats[0]?.name}</strong>의 업무 부하가 집중되고 있습니다. 용차·퀵 대체 또는 업무 이관을 검토하세요.</span>
            </div>
          )}
          {procRank[0]&&<div style={{background:`${C.process}08`,borderRadius:10,padding:"11px 13px",marginBottom:8,border:`1px solid ${C.process}22`}}><span style={{fontSize:12,color:C.process}}>⚙️ <strong>{procRank[0][0]}</strong> 공정이 가장 많습니다 ({procRank[0][1]}회). 전담 협력업체 계약을 검토하세요.</span></div>}
          {(transFreq["용차"]||0)+(transFreq["퀵"]||0)>(transFreq["자차"]||0)&&<div style={{background:`${C.warn}08`,borderRadius:10,padding:"11px 13px",marginBottom:8,border:`1px solid ${C.warn}22`}}><span style={{fontSize:12,color:C.warn}}>🚐 외부자원 활용이 자차를 초과했습니다. 비용 대비 효율 점검이 필요합니다.</span></div>}
          {clientRank[0]&&<div style={{background:`${C.accent}08`,borderRadius:10,padding:"11px 13px",border:`1px solid ${C.accent}22`}}><span style={{fontSize:12,color:C.accent}}>🏢 <strong>{clientRank[0][0]}</strong>가 가장 빈번합니다 ({clientRank[0][1]}회). 전담 인력·루트 최적화를 고려하세요.</span></div>}
        </Card>
      </div>
    </div>
  );
}


/* ══════════════════════════════════════════
   📝 출하 요청 폼 (조회자·직원)
   - 거래처/품목/위치/희망일 입력
   - 제출 → requests state에 추가
══════════════════════════════════════════ */
function RequestForm({user,zones,members,onBack,onSubmit}){
  const [step,setStep]=useState(1);
  const [cat,setCat]=useState("양산출하");
  const [client,setClient]=useState("");
  const [requester,setRequester]=useState(user.name+" ("+user.dept+")");
  const [urgency,setUrgency]=useState("일반");
  const [packaging,setPackaging]=useState("");
  const [transport,setTransport]=useState("자차");
  const [carNum,setCarNum]=useState("");
  const [desiredDate,setDesiredDate]=useState(todayStr());
  const [note,setNote]=useState("");
  const [items,setItems]=useState([{
    id:uid(),text:"",detail:"",extra:"",
    hasProc:false,procType:"도금",dueDate:"",
    loc:{zone:zones[0]||"A창고",rack:"",pallet:"",memo:""}
  }]);
  const [done,setDone]=useState(false);

  const inp={background:C.card,border:`1px solid ${C.border}`,borderRadius:9,color:C.text,fontSize:14,padding:"10px 12px",outline:"none",width:"100%",boxSizing:"border-box"};
  const cc=CAT[cat];
  const s1OK=client.trim()&&requester.trim()&&desiredDate&&packaging.trim();
  const s2OK=items.some(i=>i.text.trim()&&i.detail.trim());

  const setItm=(id,k,v)=>setItems(its=>its.map(i=>i.id===id?{...i,[k]:v}:i));
  const setLoc=(id,k,v)=>setItems(its=>its.map(i=>i.id===id?{...i,loc:{...i.loc,[k]:v}}:i));

  function doSubmit(){
    const req={
      id:uid(),
      requestedBy:user.id, requestedByName:user.name, requestedByDept:user.dept,
      requestedAt:fmtDT(),
      category:cat, client:client.trim(), requester:requester.trim(),
      desiredDate, urgency,
      packaging:packaging.trim(), transport, carNum:transport!=="자차"?carNum:"",
      note:note.trim(), items,
      status:"대기", confirmedDate:"", confirmedAssignee:"", reviewNote:"",
    };
    onSubmit(req);
    setDone(true);
  }

  if(done) return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,textAlign:"center"}}>
      <div style={{fontSize:60,marginBottom:14}}>🎉</div>
      <div style={{fontSize:22,fontWeight:800,color:C.text,marginBottom:8}}>요청 제출 완료!</div>
      <div style={{fontSize:13,color:C.sub,lineHeight:1.9,marginBottom:28}}>
        관리자가 검토 후 출하 일정을 확정합니다.<br/>
        <strong style={{color:C.accent}}>"요청 현황"</strong> 탭에서 처리 상태를 확인하세요.
      </div>
      <button onClick={onBack} style={{background:`linear-gradient(135deg,${C.accentL},${C.accent})`,color:"#fff",border:"none",borderRadius:14,padding:"13px 32px",fontSize:15,fontWeight:800,cursor:"pointer"}}>확인</button>
    </div>
  );

  const stepLabels=["기본 정보","품목 & 위치","최종 확인"];

  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      <Hdr title="출하 요청" sub="관리자 검토 후 일정 확정" onBack={onBack}/>
      {/* 단계 바 */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"14px 16px"}}>
        <div style={{display:"flex",marginBottom:10}}>
          {[1,2,3].map(s=>(
            <div key={s} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <div style={{width:28,height:28,borderRadius:"50%",
                background:step>s?C.done:step===s?C.accent:C.border,
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:12,fontWeight:800,color:step>=s?"#fff":C.sub,transition:"all 0.2s"}}>
                {step>s?"✓":s}
              </div>
              <div style={{fontSize:10,color:step>=s?C.accent:C.sub,fontWeight:step===s?800:400}}>{stepLabels[s-1]}</div>
            </div>
          ))}
        </div>
        <div style={{height:4,background:C.muted,borderRadius:99,overflow:"hidden"}}>
          <div style={{width:`${((step-1)/2)*100}%`,height:"100%",background:C.accent,borderRadius:99,transition:"width 0.3s"}}/>
        </div>
      </div>

      <div style={{padding:"16px 16px 100px"}}>
        {/* ─ 단계 1 ─ */}
        {step===1&&(<>
          <div style={{background:`${C.accent}08`,border:`1px solid ${C.accent}25`,borderRadius:12,padding:"12px 14px",marginBottom:14,fontSize:12,color:C.accent,lineHeight:1.8}}>
            📋 출하 요청을 작성하면 관리자가 검토 후 출하 계획에 반영합니다
          </div>
          <Card style={{padding:"16px",marginBottom:14}}>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:12,color:C.sub,fontWeight:700,marginBottom:8}}>출하 구분</div>
              <div style={{display:"flex",gap:8}}>
                {["양산출하","일반출하","사내출하"].map(c=>{ const ccc=CAT[c]||CAT["일반출하"],sel=cat===c; return(
                  <button key={c} onClick={()=>setCat(c)} style={{flex:1,padding:"10px 2px",borderRadius:12,fontSize:12,fontWeight:800,border:`2px solid ${sel?ccc.color:C.border}`,background:sel?ccc.bg:C.card2,color:sel?ccc.color:C.sub,cursor:"pointer"}}>
                    {ccc.icon}<br/>{c.replace("출하","")}
                  </button>
                );})}
              </div>
            </div>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:C.danger,fontWeight:700,marginBottom:6}}>거래처 *</div>
              <input value={client} onChange={e=>setClient(e.target.value)} placeholder="예: 기아자동차 광주공장" style={inp}/>
            </div>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:C.danger,fontWeight:700,marginBottom:6}}>의뢰자 * <span style={{color:C.sub,fontWeight:400,fontSize:11}}>(이름+부서)</span></div>
              <input value={requester} onChange={e=>setRequester(e.target.value)} placeholder="예: 생산팀 홍길동" style={inp}/>
            </div>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:C.danger,fontWeight:700,marginBottom:6}}>희망 출하일 *</div>
              <input type="date" value={desiredDate} onChange={e=>setDesiredDate(e.target.value)} style={inp} min={todayStr()}/>
              <div style={{fontSize:11,color:C.sub,marginTop:4}}>※ 최종 출하일은 관리자 검토 후 확정됩니다</div>
            </div>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:C.danger,fontWeight:700,marginBottom:8}}>긴급도 *</div>
              <div style={{display:"flex",gap:8}}>
                {URGENCY.map(u=>{ const c=URG_COLOR[u],sel=urgency===u; return(
                  <button key={u} onClick={()=>setUrgency(u)} style={{flex:1,padding:"10px 4px",borderRadius:10,fontSize:13,fontWeight:800,border:`2px solid ${sel?c:C.border}`,background:sel?`${c}15`:C.card2,color:sel?c:C.sub,cursor:"pointer"}}>
                    {URG_ICON[u]} {u}
                  </button>
                );})}
              </div>
            </div>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:C.danger,fontWeight:700,marginBottom:6}}>포장 형태 *</div>
              <input value={packaging} onChange={e=>setPackaging(e.target.value)} placeholder="예: 파렛 랩핑 / 박스 포장" style={inp}/>
            </div>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:C.sub,fontWeight:700,marginBottom:8}}>운송 방법</div>
              <div style={{display:"flex",gap:6,marginBottom:transport!=="자차"&&transport!=="기타"?8:0}}>
                {TRANSPORT.map(t=>{ const tc=TRANS_COLOR[t]||C.dim,sel=transport===t; return(
                  <button key={t} onClick={()=>setTransport(t)} style={{flex:1,padding:"8px 2px",borderRadius:9,fontSize:11,fontWeight:700,border:`1.5px solid ${sel?tc:C.border}`,background:sel?`${tc}15`:C.card2,color:sel?tc:C.sub,cursor:"pointer"}}>
                    {TRANS_ICON[t]}<br/>{t}
                  </button>
                );})}
              </div>
              {transport!=="자차"&&transport!=="기타"&&<input value={carNum} onChange={e=>setCarNum(e.target.value)} placeholder={transport==="용차"?"차량번호":"퀵 업체명"} style={{...inp,marginTop:4}}/>}
            </div>
            <div>
              <div style={{fontSize:12,color:C.sub,fontWeight:700,marginBottom:6}}>전달사항</div>
              <input value={note} onChange={e=>setNote(e.target.value)} placeholder="출하팀에 전달할 내용" style={inp}/>
            </div>
          </Card>
          <button onClick={()=>s1OK&&setStep(2)} style={{width:"100%",padding:"14px",borderRadius:14,background:s1OK?`linear-gradient(135deg,${C.accentL},${C.accent})`:C.muted,color:s1OK?"#fff":C.dim,border:"none",fontSize:15,fontWeight:800,cursor:s1OK?"pointer":"not-allowed"}}>
            {s1OK?"다음: 품목 & 위치 →":"필수 항목을 모두 입력하세요"}
          </button>
        </>)}

        {/* ─ 단계 2 ─ */}
        {step===2&&(<>
          <div style={{background:`${C.loc}10`,border:`1px solid ${C.loc}30`,borderRadius:12,padding:"12px 14px",marginBottom:14,fontSize:12,color:C.loc,lineHeight:1.8}}>
            📍 <strong>완제품 위치(구역·선반·파렛)를 정확히 입력</strong>하면 출하팀이 빠르게 찾을 수 있습니다
          </div>
          <Card style={{padding:"14px",marginBottom:12}}>
            {items.map((item,idx)=>(
              <div key={item.id} style={{background:C.card2,borderRadius:12,padding:"12px",marginBottom:10,border:`1px solid ${C.border}`}}>
                <div style={{display:"flex",gap:8,marginBottom:8}}>
                  <input placeholder="품목명 *" value={item.text} onChange={e=>setItm(item.id,"text",e.target.value)} style={{...inp,flex:1,fontWeight:700}}/>
                  <input placeholder="수량" value={item.extra} onChange={e=>setItm(item.id,"extra",e.target.value)} style={{...inp,width:68}}/>
                  {items.length>1&&<button onClick={()=>setItems(its=>its.filter(i=>i.id!==item.id))} style={{background:"none",border:"none",color:C.dim,fontSize:18,cursor:"pointer",flexShrink:0}}>✕</button>}
                </div>
                <input placeholder="LOT번호 / 규격 *" value={item.detail} onChange={e=>setItm(item.id,"detail",e.target.value)} style={{...inp,fontSize:12,fontFamily:"monospace",marginBottom:12}}/>
                <div style={{background:`${C.loc}08`,borderRadius:10,padding:"12px",border:`1px solid ${C.loc}33`}}>
                  <div style={{fontSize:12,color:C.loc,fontWeight:800,marginBottom:10}}>📍 완제품 위치</div>
                  <div style={{marginBottom:8}}>
                    <div style={{fontSize:11,color:C.sub,fontWeight:700,marginBottom:6}}>창고 구역</div>
                    <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                      {zones.map(z=><button key={z} onClick={()=>setLoc(item.id,"zone",z)} style={{padding:"5px 10px",borderRadius:8,fontSize:11,fontWeight:700,border:`1.5px solid ${item.loc?.zone===z?C.loc:C.border}`,background:item.loc?.zone===z?`${C.loc}15`:C.card,color:item.loc?.zone===z?C.loc:C.sub,cursor:"pointer"}}>{z}</button>)}
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                    <div><div style={{fontSize:11,color:C.sub,fontWeight:700,marginBottom:5}}>선반 번호</div><input value={item.loc?.rack||""} onChange={e=>setLoc(item.id,"rack",e.target.value)} placeholder="예: 3-B" style={{...inp,fontSize:12}}/></div>
                    <div><div style={{fontSize:11,color:C.sub,fontWeight:700,marginBottom:5}}>파렛 번호</div><input value={item.loc?.pallet||""} onChange={e=>setLoc(item.id,"pallet",e.target.value)} placeholder="예: 2" style={{...inp,fontSize:12}}/></div>
                  </div>
                  <input value={item.loc?.memo||""} onChange={e=>setLoc(item.id,"memo",e.target.value)} placeholder="위치 메모 (예: 파렛 앞줄)" style={{...inp,fontSize:12}}/>
                </div>
                <div style={{marginTop:10}}>
                  <button onClick={()=>setItm(item.id,"hasProc",!item.hasProc)} style={{padding:"5px 12px",borderRadius:20,fontSize:12,fontWeight:700,border:`1.5px solid ${item.hasProc?C.process:C.border}`,background:item.hasProc?`${C.process}12`:C.card,color:item.hasProc?C.process:C.sub,cursor:"pointer"}}>⚙️ 공정 포함</button>
                </div>
                {item.hasProc&&(<div style={{marginTop:10,padding:"10px 12px",background:C.card,borderRadius:9,border:`1px solid ${C.border}`}}>
                  <div style={{fontSize:11,color:C.sub,fontWeight:700,marginBottom:7}}>공정 종류</div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
                    {PROC_TYPES.map(pt=><button key={pt} onClick={()=>setItm(item.id,"procType",pt)} style={{padding:"5px 10px",borderRadius:8,fontSize:11,fontWeight:700,border:`1.5px solid ${item.procType===pt?C.process:C.border}`,background:item.procType===pt?`${C.process}12`:C.card2,color:item.procType===pt?C.process:C.sub,cursor:"pointer"}}>{pt}</button>)}
                  </div>
                  <div style={{fontSize:11,color:C.sub,fontWeight:700,marginBottom:5}}>납기일</div>
                  <input type="date" value={item.dueDate} onChange={e=>setItm(item.id,"dueDate",e.target.value)} style={{...inp,fontSize:12}}/>
                </div>)}
              </div>
            ))}
            <button onClick={()=>setItems(its=>[...its,{id:uid(),text:"",detail:"",extra:"",hasProc:false,procType:"도금",dueDate:"",loc:{zone:zones[0]||"A창고",rack:"",pallet:"",memo:""}}])}
              style={{width:"100%",padding:"10px",borderRadius:10,border:`1.5px dashed ${C.border}`,background:C.card2,color:C.sub,fontSize:13,cursor:"pointer"}}>
              + 품목 추가
            </button>
          </Card>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setStep(1)} style={{flex:1,padding:"14px",borderRadius:14,background:C.muted,border:"none",color:C.sub,fontSize:14,fontWeight:700,cursor:"pointer"}}>← 이전</button>
            <button onClick={()=>s2OK&&setStep(3)} style={{flex:2,padding:"14px",borderRadius:14,background:s2OK?`linear-gradient(135deg,${C.accentL},${C.accent})`:C.muted,color:s2OK?"#fff":C.dim,border:"none",fontSize:14,fontWeight:800,cursor:s2OK?"pointer":"not-allowed"}}>
              {s2OK?"다음: 최종 확인 →":"품목명·LOT 필수"}
            </button>
          </div>
        </>)}

        {/* ─ 단계 3 ─ */}
        {step===3&&(<>
          <Card style={{padding:"16px",marginBottom:14,border:`2px solid ${C.done}44`}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{fontSize:32}}>📋</div>
              <div>
                <div style={{fontSize:15,fontWeight:800,color:C.done}}>요청서 작성 완료</div>
                <div style={{fontSize:11,color:C.sub,marginTop:2}}>관리자 검토 후 출하 일정이 확정됩니다</div>
              </div>
            </div>
          </Card>
          <Card style={{padding:"16px",marginBottom:14}}>
            <div style={{fontSize:14,fontWeight:800,color:C.text,marginBottom:14}}>요청 요약</div>
            {[
              {l:"출하구분",v:`${cc.icon} ${cat}`},
              {l:"거래처",  v:client},
              {l:"의뢰자",  v:requester},
              {l:"희망 출하일",v:desiredDate},
              {l:"긴급도",  v:`${URG_ICON[urgency]} ${urgency}`},
              {l:"포장형태",v:packaging},
              {l:"운송",    v:`${TRANS_ICON[transport]} ${transport}${carNum?" ("+carNum+")":""}`},
            ].map(({l,v})=>(
              <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
                <span style={{fontSize:12,color:C.sub,fontWeight:700}}>{l}</span>
                <span style={{fontSize:13,fontWeight:700,color:C.text}}>{v}</span>
              </div>
            ))}
            {note&&<div style={{marginTop:8,fontSize:12,color:C.sub,background:C.card2,borderRadius:8,padding:"8px 10px"}}>💬 {note}</div>}
          </Card>
          <Card style={{padding:"14px",marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10}}>품목 & 위치</div>
            {items.filter(i=>i.text).map(item=>(
              <div key={item.id} style={{background:C.card2,borderRadius:10,padding:"10px 12px",marginBottom:8,border:`1px solid ${C.border}`}}>
                <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3,flexWrap:"wrap"}}>
                  <span style={{fontSize:13,fontWeight:700,color:C.text}}>{item.text}</span>
                  {item.extra&&<span style={{background:`${C.warn}15`,color:C.warn,fontSize:11,fontWeight:700,padding:"1px 6px",borderRadius:5}}>{item.extra}</span>}
                  {item.hasProc&&<span style={{background:`${C.process}12`,color:C.process,fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:5}}>⚙️{item.procType}</span>}
                </div>
                {item.detail&&<div style={{fontSize:11,color:C.sub,fontFamily:"monospace"}}>{item.detail}</div>}
                <div style={{marginTop:4}}><LocBadge loc={item.loc}/></div>
              </div>
            ))}
          </Card>
          <div style={{background:`${C.accent}08`,border:`1px solid ${C.accent}30`,borderRadius:12,padding:"12px 14px",marginBottom:16,fontSize:12,color:C.sub,lineHeight:1.8}}>
            ✅ 제출 후 <strong style={{color:C.accent}}>"요청 현황"</strong> 탭에서 처리 상태를 확인할 수 있습니다
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setStep(2)} style={{flex:1,padding:"14px",borderRadius:14,background:C.muted,border:"none",color:C.sub,fontSize:14,fontWeight:700,cursor:"pointer"}}>← 이전</button>
            <button onClick={doSubmit} style={{flex:2,padding:"14px",borderRadius:14,background:`linear-gradient(135deg,${C.accentL},${C.accent})`,border:"none",color:"#fff",fontSize:14,fontWeight:800,cursor:"pointer",boxShadow:"0 4px 14px rgba(18,89,195,0.35)"}}>
              출하 요청 제출 →
            </button>
          </div>
        </>)}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   📋 내 요청 현황 (조회자·직원)
══════════════════════════════════════════ */
function MyRequests({requests,user,onBack,onNewRequest}){
  const mine=requests.filter(r=>r.requestedBy===user.id).sort((a,b)=>b.requestedAt.localeCompare(a.requestedAt));
  const S_COLOR={대기:C.warn,승인:C.done,수정됨:C.accent,거부:C.danger};
  const S_ICON={대기:"⏳",승인:"✅",수정됨:"✏️",거부:"❌"};
  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      <Hdr title="출하 요청 현황" sub="내가 제출한 요청 목록" onBack={onBack}
        right={<button onClick={onNewRequest} style={{background:`linear-gradient(135deg,${C.accentL},${C.accent})`,color:"#fff",border:"none",borderRadius:9,padding:"7px 13px",fontSize:13,fontWeight:700,cursor:"pointer"}}>+ 새 요청</button>}/>
      <div style={{padding:"14px 14px 100px"}}>
        {/* 상태 요약 */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:14}}>
          {Object.entries(S_ICON).map(([s,ic])=>{ const cnt=mine.filter(r=>r.status===s).length; const c=S_COLOR[s]; return(
            <Card key={s} style={{padding:"10px 6px",textAlign:"center"}}>
              <div style={{fontSize:18}}>{ic}</div>
              <div style={{fontSize:20,fontWeight:900,color:cnt>0?c:C.dim,fontFamily:"monospace"}}>{cnt}</div>
              <div style={{fontSize:10,color:C.sub,marginTop:1}}>{s}</div>
            </Card>
          );})}
        </div>

        {mine.length===0&&(
          <Card style={{padding:"40px 20px",textAlign:"center"}}>
            <div style={{fontSize:40,marginBottom:10}}>📋</div>
            <div style={{color:C.sub,fontSize:14,marginBottom:16}}>제출한 요청이 없습니다</div>
            <button onClick={onNewRequest} style={{background:`linear-gradient(135deg,${C.accentL},${C.accent})`,color:"#fff",border:"none",borderRadius:12,padding:"11px 24px",fontSize:14,fontWeight:700,cursor:"pointer"}}>+ 출하 요청하기</button>
          </Card>
        )}

        {mine.map(req=>{
          const cc=CAT[req.category]||CAT["일반출하"]; const sc=S_COLOR[req.status];
          return(
            <Card key={req.id} style={{marginBottom:10}}>
              <div style={{height:4,background:cc.color}}/>
              <div style={{padding:"13px 14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:5,flexWrap:"wrap"}}>
                      <span style={{background:cc.bg,color:cc.color,fontSize:11,fontWeight:800,padding:"3px 9px",borderRadius:20}}>{cc.icon} {req.category}</span>
                      <UrgBadge urgency={req.urgency}/>
                    </div>
                    <div style={{fontSize:15,fontWeight:800,color:C.text}}>{req.client}</div>
                    <div style={{fontSize:11,color:C.sub,marginTop:2}}>
                      희망일: <strong style={{color:C.accent}}>{req.desiredDate}</strong>
                      {req.confirmedDate&&req.confirmedDate!==req.desiredDate&&
                        <span style={{color:C.done,marginLeft:6}}>→ 확정: <strong>{req.confirmedDate}</strong></span>}
                    </div>
                    <div style={{fontSize:11,color:C.sub}}>제출: {req.requestedAt}</div>
                    <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:5}}>
                      {req.items.filter(i=>i.text).map(item=>(
                        <span key={item.id} style={{background:C.muted,color:C.sub,fontSize:10,padding:"2px 7px",borderRadius:6}}>{item.text}{item.extra?" "+item.extra:""}</span>
                      ))}
                    </div>
                  </div>
                  <div style={{textAlign:"center",flexShrink:0,marginLeft:12}}>
                    <div style={{fontSize:26}}>{S_ICON[req.status]}</div>
                    <div style={{fontSize:11,fontWeight:800,color:sc,marginTop:2}}>{req.status}</div>
                  </div>
                </div>
                {/* 관리자 검토 메모 */}
                {req.reviewNote&&(
                  <div style={{background:req.status==="거부"?`${C.danger}08`:`${C.done}08`,borderRadius:9,padding:"8px 11px",border:`1px solid ${req.status==="거부"?C.danger:C.done}33`,fontSize:12,color:req.status==="거부"?C.danger:C.done}}>
                    💬 관리자: {req.reviewNote}
                  </div>
                )}
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   🗓️ 관리자 — 요청 검토 & 일별 출하 계획
══════════════════════════════════════════ */
function RequestReview({requests,updRequests,members,zones,onBack,onCreatePlan}){
  const [tab,setTab]=useState("대기");
  const [selReq,setSelReq]=useState(null);
  const [eDate,setEDate]=useState("");
  const [eAssignee,setEAssignee]=useState("");
  const [eNote,setENote]=useState("");
  const [eStatus,setEStatus]=useState("승인");

  const S_COLOR={대기:C.warn,승인:C.done,수정됨:C.accent,거부:C.danger};
  const S_ICON={대기:"⏳",승인:"✅",수정됨:"✏️",거부:"❌"};
  const staffList=members.filter(u=>u.role==="staff");
  const inp={background:C.card,border:`1px solid ${C.border}`,borderRadius:9,color:C.text,fontSize:14,padding:"10px 12px",outline:"none",width:"100%",boxSizing:"border-box"};

  const filtered=(tab==="전체"?requests:requests.filter(r=>r.status===tab))
    .sort((a,b)=>a.desiredDate.localeCompare(b.desiredDate));

  // 일별 계획 — 승인/수정됨 요청을 날짜별로 그룹
  const byDate={};
  requests.filter(r=>r.status==="승인"||r.status==="수정됨").forEach(r=>{
    const d=r.confirmedDate||r.desiredDate;
    if(!byDate[d]) byDate[d]=[];
    byDate[d].push(r);
  });

  function openReview(req){
    setSelReq(req);
    setEDate(req.confirmedDate||req.desiredDate);
    setEAssignee(req.confirmedAssignee||"");
    setENote(req.reviewNote||"");
    setEStatus(req.status==="대기"?"승인":req.status);
  }

  function saveReview(){
    const updated={...selReq,status:eStatus,confirmedDate:eDate,confirmedAssignee:eAssignee,reviewNote:eNote.trim()};
    updRequests(rs=>rs.map(r=>r.id!==selReq.id?r:updated));
    if(eStatus==="승인"||eStatus==="수정됨") onCreatePlan(updated);
    setSelReq(null);
  }

  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      {/* 검토 모달 */}
      {selReq&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:C.card,borderRadius:18,width:"100%",maxWidth:400,maxHeight:"88vh",overflowY:"auto",boxShadow:"0 8px 32px rgba(18,89,195,0.2)"}}>
            {/* 모달 헤더 */}
            <div style={{padding:"18px 20px 14px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"flex-start",position:"sticky",top:0,background:C.card,zIndex:10}}>
              <div>
                <div style={{fontSize:17,fontWeight:800,color:C.text}}>📋 요청 검토</div>
                <div style={{fontSize:12,color:C.sub,marginTop:2}}>{selReq.requestedByName}({selReq.requestedByDept}) 제출</div>
              </div>
              <button onClick={()=>setSelReq(null)} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.sub,padding:"0 0 0 10px"}}>✕</button>
            </div>
            <div style={{padding:"16px 20px"}}>
              {/* 요청 요약 */}
              <div style={{background:C.card2,borderRadius:12,padding:"12px",marginBottom:16,border:`1px solid ${C.border}`}}>
                <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
                  <span style={{background:CAT[selReq.category]?.bg,color:CAT[selReq.category]?.color,fontSize:11,fontWeight:800,padding:"3px 9px",borderRadius:20}}>{CAT[selReq.category]?.icon} {selReq.category}</span>
                  <UrgBadge urgency={selReq.urgency}/>
                  <TransBadge transport={selReq.transport}/>
                </div>
                <div style={{fontSize:15,fontWeight:800,color:C.text,marginBottom:3}}>{selReq.client}</div>
                <div style={{fontSize:11,color:C.sub}}>의뢰자: {selReq.requester}</div>
                <div style={{fontSize:12,color:C.accent,fontWeight:700,marginTop:2}}>희망 출하일: {selReq.desiredDate}</div>
                <div style={{fontSize:11,color:C.sub}}>포장: {selReq.packaging} · {TRANS_ICON[selReq.transport]} {selReq.transport}{selReq.carNum?" "+selReq.carNum:""}</div>
                {selReq.note&&<div style={{fontSize:11,color:C.sub,marginTop:3}}>💬 {selReq.note}</div>}
              </div>

              {/* 품목 목록 */}
              <div style={{marginBottom:16}}>
                <div style={{fontSize:12,color:C.sub,fontWeight:700,marginBottom:8}}>품목 ({selReq.items.filter(i=>i.text).length}건)</div>
                {selReq.items.filter(i=>i.text).map(item=>(
                  <div key={item.id} style={{background:C.card2,borderRadius:9,padding:"8px 10px",marginBottom:6,border:`1px solid ${C.border}`}}>
                    <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap",marginBottom:2}}>
                      <span style={{fontSize:13,fontWeight:700,color:C.text}}>{item.text}</span>
                      {item.extra&&<span style={{background:`${C.warn}15`,color:C.warn,fontSize:11,fontWeight:700,padding:"1px 5px",borderRadius:5}}>{item.extra}</span>}
                      {item.hasProc&&<span style={{background:`${C.process}12`,color:C.process,fontSize:10,fontWeight:700,padding:"1px 5px",borderRadius:5}}>⚙️{item.procType}</span>}
                    </div>
                    {item.detail&&<div style={{fontSize:11,color:C.sub,fontFamily:"monospace"}}>{item.detail}</div>}
                    <LocBadge loc={item.loc}/>
                  </div>
                ))}
              </div>

              {/* 관리자 검토 */}
              <div style={{background:`${C.accent}06`,borderRadius:12,padding:"14px",border:`1px solid ${C.accent}25`,marginBottom:16}}>
                <div style={{fontSize:13,fontWeight:800,color:C.accent,marginBottom:12}}>✏️ 검토 · 수정</div>
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:12,color:C.sub,fontWeight:700,marginBottom:6}}>확정 출하일 <span style={{color:C.sub,fontWeight:400,fontSize:11}}>(수정 가능)</span></div>
                  <input type="date" value={eDate} onChange={e=>setEDate(e.target.value)} style={inp}/>
                </div>
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:12,color:C.sub,fontWeight:700,marginBottom:8}}>담당자 배정</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {staffList.map(u=>(
                      <button key={u.id} onClick={()=>setEAssignee(u.id===eAssignee?"":u.id)}
                        style={{padding:"6px 12px",borderRadius:20,fontSize:12,fontWeight:700,
                          border:`1.5px solid ${eAssignee===u.id?C.general:C.border}`,
                          background:eAssignee===u.id?`${C.general}15`:C.card,
                          color:eAssignee===u.id?C.general:C.sub,cursor:"pointer"}}>
                        {u.name}{u.specialty&&<span style={{fontSize:9,marginLeft:3}}>{u.specialty==="양산"?"🏭":"📦"}</span>}
                      </button>
                    ))}
                  </div>
                </div>
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:12,color:C.sub,fontWeight:700,marginBottom:6}}>검토 메모 <span style={{fontWeight:400,fontSize:11}}>(요청자에게 표시)</span></div>
                  <input value={eNote} onChange={e=>setENote(e.target.value)} placeholder="예: 출하일 변경 / 담당자 조정 등" style={inp}/>
                </div>
                <div>
                  <div style={{fontSize:12,color:C.sub,fontWeight:700,marginBottom:8}}>처리 결과 선택</div>
                  <div style={{display:"flex",gap:8}}>
                    {["승인","수정됨","거부"].map(s=>{ const c=S_COLOR[s],sel=eStatus===s; return(
                      <button key={s} onClick={()=>setEStatus(s)} style={{flex:1,padding:"10px 4px",borderRadius:10,fontSize:12,fontWeight:800,border:`2px solid ${sel?c:C.border}`,background:sel?`${c}15`:C.card2,color:sel?c:C.sub,cursor:"pointer"}}>
                        {S_ICON[s]} {s}
                      </button>
                    );})}
                  </div>
                </div>
              </div>

              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setSelReq(null)} style={{flex:1,padding:"12px",borderRadius:10,background:C.muted,border:"none",color:C.sub,fontWeight:700,cursor:"pointer",fontSize:14}}>취소</button>
                <button onClick={saveReview} style={{flex:2,padding:"12px",borderRadius:10,background:eStatus==="거부"?C.danger:`linear-gradient(135deg,${C.accentL},${C.accent})`,border:"none",color:"#fff",fontWeight:800,cursor:"pointer",fontSize:14}}>
                  {eStatus==="거부"?"거부 처리":"검토 완료 · 계획 반영"}
                </button>
              </div>
            </div>
          </div>
        </div>
      )}

      <Hdr title="출하 요청 검토" sub="요청 확인·수정·일정 확정" onBack={onBack}/>
      {/* 탭 */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,display:"flex",overflowX:"auto"}}>
        {["대기","일별계획","승인","수정됨","거부","전체"].map(t=>{
          const cnt=t==="일별계획"?Object.keys(byDate).length:t==="전체"?requests.length:requests.filter(r=>r.status===t).length;
          return(
            <button key={t} onClick={()=>setTab(t)} style={{padding:"13px 12px",background:"none",border:"none",borderBottom:`3px solid ${tab===t?C.accent:"transparent"}`,color:tab===t?C.accent:C.sub,fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",position:"relative"}}>
              {t}{cnt>0&&<span style={{marginLeft:4,background:t==="대기"?C.danger:t==="일별계획"?C.accent:C.muted,color:t==="대기"||t==="일별계획"?"#fff":C.sub,fontSize:10,fontWeight:800,borderRadius:8,padding:"1px 6px"}}>{cnt}</span>}
            </button>
          );
        })}
      </div>

      <div style={{padding:"14px 14px 100px"}}>
        {/* ── 일별 계획 탭 ── */}
        {tab==="일별계획"&&(<>
          <div style={{background:`${C.accent}08`,border:`1px solid ${C.accent}25`,borderRadius:12,padding:"12px 14px",marginBottom:14,fontSize:12,color:C.accent,lineHeight:1.8}}>
            🗓️ 승인된 요청이 날짜별로 자동 정리된 출하 계획입니다. 수정하려면 각 항목의 <strong>수정</strong> 버튼을 탭하세요.
          </div>
          {Object.keys(byDate).sort().length===0&&(
            <Card style={{padding:"40px 20px",textAlign:"center"}}><div style={{fontSize:40,marginBottom:10}}>🗓️</div><div style={{color:C.sub}}>승인된 요청이 없습니다</div></Card>
          )}
          {Object.keys(byDate).sort().map(date=>{
            const reqs=byDate[date];
            const isToday=date===todayStr(); const isPast=date<todayStr();
            return(
              <Card key={date} style={{marginBottom:14,border:isToday?`2px solid ${C.accent}55`:""}}>
                <div style={{background:isToday?`${C.accent}08`:C.card2,padding:"12px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontSize:16,fontWeight:800,color:isToday?C.accent:isPast?C.sub:C.text}}>
                      {fmtDate(date)}
                      {isToday&&<span style={{marginLeft:8,background:C.accent,color:"#fff",fontSize:10,fontWeight:800,borderRadius:8,padding:"2px 7px"}}>오늘</span>}
                      {isPast&&<span style={{marginLeft:8,background:C.muted,color:C.sub,fontSize:10,borderRadius:8,padding:"2px 7px"}}>지난일</span>}
                    </div>
                    <div style={{fontSize:11,color:C.sub,marginTop:2}}>확정 출하 {reqs.length}건</div>
                  </div>
                  <div style={{fontSize:26,fontWeight:900,fontFamily:"monospace",color:isToday?C.accent:C.sub}}>{reqs.length}<span style={{fontSize:12}}>건</span></div>
                </div>
                {reqs.map(req=>{
                  const cc=CAT[req.category]||CAT["일반출하"];
                  const asgn=members.find(u=>u.id===req.confirmedAssignee);
                  return(
                    <div key={req.id} style={{padding:"11px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",gap:10,alignItems:"center"}}>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:4,flexWrap:"wrap"}}>
                          <span style={{background:cc.bg,color:cc.color,fontSize:10,fontWeight:800,padding:"2px 7px",borderRadius:10}}>{cc.icon} {req.category}</span>
                          <UrgBadge urgency={req.urgency}/>
                          <TransBadge transport={req.transport}/>
                          <span style={{background:`${S_COLOR[req.status]}15`,color:S_COLOR[req.status],fontSize:10,fontWeight:800,padding:"2px 6px",borderRadius:8}}>{S_ICON[req.status]} {req.status}</span>
                        </div>
                        <div style={{fontSize:14,fontWeight:700,color:C.text}}>{req.client}</div>
                        <div style={{fontSize:11,color:C.sub}}>의뢰: {req.requester}</div>
                        {asgn&&<div style={{fontSize:11,color:C.general,fontWeight:700}}>👷 담당: {asgn.name}</div>}
                        {req.reviewNote&&<div style={{fontSize:11,color:C.accent,marginTop:2}}>💬 {req.reviewNote}</div>}
                        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:5}}>
                          {req.items.filter(i=>i.text).map(item=>(
                            <span key={item.id} style={{background:C.muted,color:C.sub,fontSize:10,padding:"2px 7px",borderRadius:6}}>{item.text}{item.extra?" "+item.extra:""}</span>
                          ))}
                        </div>
                      </div>
                      <button onClick={()=>openReview(req)} style={{background:`${C.accent}15`,border:`1px solid ${C.accent}33`,color:C.accent,borderRadius:9,padding:"7px 12px",fontSize:12,fontWeight:700,cursor:"pointer",flexShrink:0}}>수정</button>
                    </div>
                  );
                })}
              </Card>
            );
          })}
        </>)}

        {/* ── 요청 목록 탭 ── */}
        {tab!=="일별계획"&&(<>
          {filtered.length===0&&(
            <Card style={{padding:"40px 20px",textAlign:"center"}}>
              <div style={{fontSize:40,marginBottom:10}}>{tab==="대기"?"📭":"✅"}</div>
              <div style={{color:C.sub,fontSize:14}}>{tab} 상태의 요청이 없습니다</div>
            </Card>
          )}
          {filtered.map(req=>{
            const cc=CAT[req.category]||CAT["일반출하"]; const sc=S_COLOR[req.status];
            const asgn=members.find(u=>u.id===req.confirmedAssignee);
            return(
              <Card key={req.id} style={{marginBottom:10}}>
                <div style={{height:4,background:cc.color}}/>
                <div style={{padding:"13px 14px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",gap:10}}>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:5,flexWrap:"wrap"}}>
                        <span style={{background:cc.bg,color:cc.color,fontSize:11,fontWeight:800,padding:"3px 9px",borderRadius:20}}>{cc.icon} {req.category}</span>
                        <UrgBadge urgency={req.urgency}/>
                        <span style={{background:`${sc}15`,color:sc,border:`1px solid ${sc}44`,fontSize:10,fontWeight:800,padding:"2px 7px",borderRadius:10}}>{S_ICON[req.status]} {req.status}</span>
                      </div>
                      <div style={{fontSize:15,fontWeight:800,color:C.text}}>{req.client}</div>
                      <div style={{fontSize:11,color:C.sub,marginTop:2}}>의뢰: {req.requester} · 제출: {req.requestedAt.slice(0,10)}</div>
                      <div style={{fontSize:12,fontWeight:700,color:C.accent,marginTop:2}}>
                        희망일: {req.desiredDate}
                        {req.confirmedDate&&req.confirmedDate!==req.desiredDate&&<span style={{color:C.done,marginLeft:8}}>→ 확정: {req.confirmedDate}</span>}
                      </div>
                      {asgn&&<div style={{fontSize:11,color:C.general,fontWeight:700}}>👷 담당: {asgn.name}</div>}
                      {req.reviewNote&&<div style={{fontSize:11,color:sc,marginTop:2}}>💬 {req.reviewNote}</div>}
                      <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:5}}>
                        {req.items.filter(i=>i.text).map(item=>(
                          <span key={item.id} style={{background:C.muted,color:C.sub,fontSize:10,padding:"2px 7px",borderRadius:6}}>{item.text}{item.extra?" "+item.extra:""}</span>
                        ))}
                      </div>
                    </div>
                    <button onClick={()=>openReview(req)} style={{background:`${C.accent}15`,border:`1px solid ${C.accent}33`,color:C.accent,borderRadius:9,padding:"7px 12px",fontSize:12,fontWeight:700,cursor:"pointer",flexShrink:0,alignSelf:"flex-start"}}>검토</button>
                  </div>
                </div>
              </Card>
            );
          })}
        </>)}
      </div>
    </div>
  );
}

/* ══ Firebase 실시간 DB 유틸 ══ */
const DB_PATH = "jyexpress";  // Firebase DB 루트 경로
let   _db     = null;         // firebase.database() 인스턴스

function getDb(){
  if(!_db && window.firebase?.apps?.length){
    _db = window.firebase.database();
  }
  return _db;
}

// Firebase에 전체 컬렉션 저장 (덮어쓰기)
function fbSet(collection, data){
  const db = getDb();
  if(!db) return;
  // photos는 base64라 용량 크므로 저장 제외 옵션도 가능
  try {
    db.ref(`${DB_PATH}/${collection}`).set(data);
  } catch(e){ console.warn("fbSet error:", e); }
}

// Firebase에서 한번 읽기
function fbGet(collection, cb){
  const db = getDb();
  if(!db){ cb(null); return; }
  db.ref(`${DB_PATH}/${collection}`).once("value")
    .then(snap => cb(snap.val()))
    .catch(()  => cb(null));
}

// Firebase 실시간 구독
function fbOn(collection, cb){
  const db = getDb();
  if(!db) return ()=>{};
  const ref = db.ref(`${DB_PATH}/${collection}`);
  ref.on("value", snap => cb(snap.val()));
  return ()=> ref.off("value");
}

/* ══ ROOT APP ══ */
function App(){
  const [user,    setUser]   =useState(null);
  const [posts,   setPosts]  =useState(INIT_POSTS);
  const [members, setMembers]=useState(INIT_MEMBERS);
  const [pending, setPending]=useState(INIT_PENDING);
  const [routes,  setRoutes] =useState(INIT_ROUTES);
  const [zones,   setZones]  =useState(["A창고","B창고","C창고","생산라인","검사실","임시보관","기타"]);
  const [requests,setRequests]=useState([]);
  const [fbReady, setFbReady]=useState(false);  // Firebase 연결 상태
  const [syncing, setSyncing]=useState(false);  // 저장 중 표시
  const [showZoneMgmt,setShowZoneMgmt]=useState(false);
  const [screen,  setScreen] =useState("main");
  const [postId,  setPostId] =useState(null);

  // ── Firebase 실시간 구독 ──
  useEffect(()=>{
    const db = getDb();
    if(!db){
      // Firebase 미설정 → localStorage 폴백
      try{
        const raw=localStorage.getItem("jyexpress_v3");
        if(raw){ const d=JSON.parse(raw); if(d.posts) setPosts(d.posts); if(d.members) setMembers(d.members); if(d.pending) setPending(d.pending); if(d.routes) setRoutes(d.routes); if(d.zones) setZones(d.zones); if(d.requests) setRequests(d.requests); }
      }catch(e){}
      return;
    }
    // Firebase 연결됨 → 실시간 구독
    const unsubs = [
      fbOn("posts",    v=>{ if(v) setPosts(Array.isArray(v)?v:Object.values(v));    setFbReady(true); }),
      fbOn("members",  v=>{ if(v) setMembers(Array.isArray(v)?v:Object.values(v)); }),
      fbOn("pending",  v=>{ setPending(v?( Array.isArray(v)?v:Object.values(v)):[]); }),
      fbOn("routes",   v=>{ setRoutes(v?(Array.isArray(v)?v:Object.values(v)):[]); }),
      fbOn("zones",    v=>{ if(v) setZones(Array.isArray(v)?v:Object.values(v));   }),
      fbOn("requests", v=>{ setRequests(v?(Array.isArray(v)?v:Object.values(v)):[]); }),
    ];
    setFbReady(true);
    return ()=>{ unsubs.forEach(u=>u&&u()); };
  }, []);

  // ── Firebase에 저장하는 래퍼 ──
  function fbSave(col, data){
    fbSet(col, data);
    // 인디케이터 표시
    if(typeof window!=="undefined"&&window.showSyncing) window.showSyncing();
    // localStorage 폴백도 동시 저장
    try{ localStorage.setItem("jyexpress_v3", JSON.stringify({posts,members,pending,routes,zones,requests,[col]:data})); }catch(e){}
  }

  /* ── 데이터 업데이트 함수 (Firebase 동기화 포함) ── */

  function updPosts(fn){
    setPosts(prev=>{
      const next=fn(prev);
      fbSave("posts", next);
      return next;
    });
  }
  function updMembers(fn){
    setMembers(prev=>{ const next=fn(prev); fbSave("members",next); return next; });
  }
  function updPending(fn){
    setPending(prev=>{ const next=fn(prev); fbSave("pending",next); return next; });
  }
  function updRoutes(fn){
    setRoutes(prev=>{ const next=fn(prev); fbSave("routes",next); return next; });
  }
  function updZones(val){
    setZones(val); fbSave("zones",val);
  }
  function updRequests(fn){
    setRequests(prev=>{ const next=fn(prev); fbSave("requests",next); return next; });
  }

  const toggleItem=(pid,gid,iid)=>updPosts(ps=>ps.map(p=>p.id!==pid?p:{...p,groups:p.groups.map(g=>g.id!==gid?g:{...g,items:g.items.map(i=>i.id!==iid?i:{...i,done:!i.done,doneBy:!i.done?user.name:null,doneAt:!i.done?nowTime():null})})}));

  const advanceStage=(pid,gid,iid)=>updPosts(ps=>ps.map(p=>p.id!==pid?p:{...p,groups:p.groups.map(g=>g.id!==gid?g:{...g,items:g.items.map(i=>{
    if(i.id!==iid||i.stage==="회수") return i;
    const ns=nextStage(i.stage);
    return{...i,stage:ns,stageAt:{...i.stageAt,[ns]:nowTime()},stageBy:{...i.stageBy,[ns]:user.name}};
  })})}));

  const addPhoto=(pid,gid,iid,url)=>updPosts(ps=>ps.map(p=>p.id!==pid?p:{
    ...p,
    photos:!gid?[...p.photos,url]:p.photos,
    groups:p.groups.map(g=>g.id!==gid?g:{...g,items:g.items.map(i=>i.id!==iid?i:{...i,photos:[...i.photos,url]})})
  }));

  const addVisit=(pid,v)=>updPosts(ps=>ps.map(p=>p.id!==pid?p:{...p,visits:[...(p.visits||[]),v]}));
  const addVisitPhoto=(pid,vid,url)=>updPosts(ps=>ps.map(p=>p.id!==pid?p:{...p,visits:(p.visits||[]).map(v=>v.id!==vid?v:{...v,photos:[...v.photos,url]})}));
  const deletePost=id=>updPosts(ps=>ps.filter(p=>p.id!==id));
  const savePost=p=>{ updPosts(ps=>[p,...ps]); setScreen("main"); };
  const updateLoc=(pid,iid,loc)=>updPosts(ps=>ps.map(p=>p.id!==pid?p:{...p,groups:p.groups.map(g=>({...g,items:g.items.map(i=>i.id!==iid?i:{...i,loc})}))}));
  const updateItemText=(pid,iid,text)=>updPosts(ps=>ps.map(p=>p.id!==pid?p:{...p,groups:p.groups.map(g=>({...g,items:g.items.map(i=>i.id!==iid?i:{...i,text})}))}));

  /* 승인된 요청 → posts에 자동 반영 + Firebase 동기화 */
  function createPlanFromRequest(req){
    updPosts(ps=>{
      const existing=ps.find(p=>p.date===(req.confirmedDate||req.desiredDate)&&p.category===req.category);
      const newGroup={
        id:uid(),
        region:req.client,
        assignee:req.confirmedAssignee||"",
        items:req.items.filter(i=>i.text).map(i=>({
          id:uid(), text:i.text, detail:i.detail, extra:i.extra||"",
          done:false, doneBy:null, doneAt:null,
          hasProc:i.hasProc||false, procType:i.procType||"도금",
          dueDate:i.dueDate||"",
          stage:null,
          stageAt:{의뢰출하:null,완료:null,회수:null},
          stageBy:{의뢰출하:null,완료:null,회수:null},
          transport:req.transport, carNum:req.carNum||"",
          loc:i.loc||{zone:"A창고",rack:"",pallet:"",memo:"",confirmed:false},
          photos:[],
        }))
      };
      if(existing){
        return ps.map(p=>p.id!==existing.id?p:{...p,groups:[...p.groups,newGroup]});
      } else {
        const newPost={
          id:uid(),
          date:req.confirmedDate||req.desiredDate,
          author:"이창용", time:nowTime(),
          category:req.category,
          client:req.client,
          requester:req.requester,
          transport:req.transport, carNum:req.carNum||"",
          urgency:req.urgency,
          packaging:req.packaging,
          note:req.note||"",
          photos:[], visits:[],
          groups:[newGroup],
          fromRequest:req.id,
        };
        return [newPost,...ps];
      }
    });
  }

  function openPost(id){
    const post=posts.find(p=>p.id===id);
    setPostId(id);
    setScreen(post?.category==="사내방문"?"visitlog":"detail");
  }

  function getTodayVisitPost(){
    const today=todayStr();
    let vp=posts.find(p=>p.category==="사내방문"&&p.date===today);
    if(!vp){
      vp={id:uid(),date:today,author:"이창용",time:nowTime(),category:"사내방문",client:"",requester:"",transport:"",carNum:"",urgency:"일반",packaging:"",note:"",photos:[],groups:[],visits:[]};
      setPosts(ps=>[vp,...ps]);
    }
    return vp;
  }

  function handleApprove(p){
    updMembers(m=>[...m,{id:p.id,name:p.name,role:p.wantedRole,dept:p.dept,region:null,specialty:null}]);
    updPending(ps=>ps.filter(x=>x.id!==p.id));
  }

  const activePost=posts.find(p=>p.id===postId);

  /* ── 로그인 전 화면 ── */
  if(!user){
    if(screen==="request") return(
      <AccessRequest
        onSubmit={req=>{ updPending(ps=>[...ps,req]); setScreen("login"); }}
        onBack={()=>setScreen("login")}/>
    );
    return(
      <Login
        members={members}
        pendingCount={pending.length}
        onLogin={u=>{ setUser(u); setScreen("main"); }}
        onRequest={()=>setScreen("request")}/>
    );
  }

  /* ── 로그인 후 화면 ── */
  return(
    <div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue','Apple SD Gothic Neo','Noto Sans KR',Arial,sans-serif",maxWidth:430,margin:"0 auto",background:C.bg,minHeight:"100vh"}}>
      {showZoneMgmt&&<ZoneMgmtModal zones={zones} onSave={updZones} onClose={()=>setShowZoneMgmt(false)}/>}
      {/* Firebase 연결 상태 토스트 */}
      {syncing&&typeof window!=="undefined"&&window.showSyncing&&window.showSyncing()}

      {/* 관리자 대시보드 */}
      {screen==="main"&&user.role==="admin"&&(
        <AdminDash
          posts={posts} routes={routes} members={members} pending={pending}
          user={user} requests={requests}
          onOpen={openPost} onNew={()=>setScreen("new")}
          onRoute={()=>setScreen("route")}
          onLocation={()=>setScreen("location")}
          onStats={()=>setScreen("stats")}
          onUserMgmt={()=>setScreen("usermgmt")}
          onZoneMgmt={()=>setShowZoneMgmt(true)}
          onReqReview={()=>setScreen("reqreview")}
          onLogout={()=>{ setUser(null); setScreen("main"); }}/>
      )}

      {/* 직원·조회 대시보드 */}
      {screen==="main"&&user.role!=="admin"&&(
        <ViewerDash
          posts={posts} routes={routes} members={members}
          user={user} requests={requests}
          onOpen={openPost}
          onNew={()=>setScreen("new")}
          onRoute={()=>setScreen("route")}
          onLocation={()=>setScreen("location")}
          onNewRequest={()=>setScreen("reqform")}
          onMyRequests={()=>setScreen("myreqs")}
          onNewInternalShip={()=>setScreen("new")}
          onLogout={()=>{ setUser(null); setScreen("main"); }}/>
      )}

      {/* 게시글 상세 */}
      {screen==="detail"&&(
        activePost
          ? <PostDetail
              post={activePost} members={members} user={user}
              onBack={()=>setScreen("main")}
              onToggle={toggleItem}
              onAdvanceStage={advanceStage}
              onAddPhoto={addPhoto}
              onDelete={deletePost}
              onUpdateLoc={updateLoc}/>
          : <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
              <div style={{fontSize:40,marginBottom:14}}>📭</div>
              <div style={{fontSize:16,color:C.sub,marginBottom:20}}>게시글을 찾을 수 없습니다</div>
              <button onClick={()=>setScreen("main")} style={{background:C.accent,color:"#fff",border:"none",borderRadius:12,padding:"11px 24px",fontSize:14,fontWeight:700,cursor:"pointer"}}>← 돌아가기</button>
            </div>
      )}

      {/* 사내방문 기록 */}
      {screen==="visitlog"&&activePost&&(
        <VisitLog
          post={activePost} user={user}
          onBack={()=>setScreen("main")}
          onAddVisit={addVisit}
          onAddVisitPhoto={addVisitPhoto}/>
      )}

      {/* 출하 의뢰 등록 (관리자) */}
      {screen==="new"&&(
        <NewPost
          members={members} zones={zones}
          onBack={()=>setScreen("main")}
          onSave={savePost}/>
      )}

      {/* 출하 요청 폼 (조회자·직원) */}
      {screen==="reqform"&&(
        <RequestForm
          user={user} zones={zones} members={members}
          onBack={()=>setScreen("main")}
          onSubmit={req=>{ updRequests(rs=>[...rs,req]); setScreen("myreqs"); }}/>
      )}

      {/* 내 요청 현황 (조회자·직원) */}
      {screen==="myreqs"&&(
        <MyRequests
          requests={requests} user={user}
          onBack={()=>setScreen("main")}
          onNewRequest={()=>setScreen("reqform")}/>
      )}

      {/* 요청 검토 & 일별 계획 (관리자) */}
      {screen==="reqreview"&&(
        <RequestReview
          requests={requests} updRequests={updRequests}
          members={members} zones={zones}
          onBack={()=>setScreen("main")}
          onCreatePlan={createPlanFromRequest}/>
      )}

      {/* 운행 거리 관리 */}
      {screen==="route"&&(
        <RouteScreen
          routes={routes} setRoutes={(fn)=>updRoutes(typeof fn==="function"?fn:()=>fn)}
          members={members} user={user}
          onBack={()=>setScreen("main")}/>
      )}

      {/* 완제품 위치 현황 */}
      {screen==="location"&&(
        <LocationScreen
          posts={posts} user={user} zones={zones}
          onUpdateLoc={updateLoc}
          onUpdateItemText={updateItemText}
          onBack={()=>setScreen("main")}/>
      )}

      {/* 통계 */}
      {screen==="stats"&&(
        <StatsScreen
          posts={posts} routes={routes} members={members}
          onBack={()=>setScreen("main")}/>
      )}

      {/* 팀원 관리 */}
      {screen==="usermgmt"&&(
        <UserMgmt
          members={members} pending={pending}
          onBack={()=>setScreen("main")}
          onSaveMbr={newList=>{
            updMembers(()=>newList);
            const updated=newList.find(u=>u.id===user?.id);
            if(updated) setUser(updated);
          }}
          onApprove={handleApprove}
          onReject={id=>setPending(ps=>ps.filter(p=>p.id!==id))}/>
      )}
    </div>
  );
}

    // 앱 렌더링
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>

  <script>
  // ── 동기화 인디케이터 ──
  const syncBar = document.getElementById('sync-indicator');
  const offlineToast = document.getElementById('offline-toast');

  window.showSyncing = function(){
    syncBar.className = 'syncing';
    setTimeout(()=>{ syncBar.className = 'online'; setTimeout(()=>{ syncBar.className=''; },1200); }, 800);
  };

  window.addEventListener('online',  ()=>{ offlineToast.classList.remove('show'); syncBar.className='online'; setTimeout(()=>syncBar.className='',2000); });
  window.addEventListener('offline', ()=>{ offlineToast.classList.add('show'); syncBar.className='offline'; });
  if(!navigator.onLine) offlineToast.classList.add('show');

  // Firebase 실시간 연결 상태 감지
  if(window.__FB_CONFIGURED__ && window.firebase?.apps?.length){
    const connRef = firebase.database().ref('.info/connected');
    connRef.on('value', snap=>{
      if(snap.val()===true){
        offlineToast.classList.remove('show');
      } else {
        offlineToast.classList.add('show');
      }
    });
  }

  // ── PWA 설치 배너 ──
  let deferredPrompt = null;
  const banner = document.getElementById('install-banner');
  const installBtn = document.getElementById('install-btn');
  const closeBtn = document.getElementById('install-close');

  window.addEventListener('beforeinstallprompt', e=>{
    e.preventDefault(); deferredPrompt=e;
    if(!localStorage.getItem('pwa-installed')) banner.classList.add('show');
  });
  installBtn && installBtn.addEventListener('click', async ()=>{
    if(!deferredPrompt){
      alert('📱 설치 방법\n\n【안드로이드】\n브라우저 메뉴(⋮) → "홈 화면에 추가"\n\n【아이폰】\n공유버튼(□↑) → "홈 화면에 추가"');
      return;
    }
    deferredPrompt.prompt();
    const {outcome} = await deferredPrompt.userChoice;
    if(outcome==='accepted'){ localStorage.setItem('pwa-installed','1'); banner.classList.remove('show'); }
    deferredPrompt=null;
  });
  closeBtn && closeBtn.addEventListener('click', ()=>{ banner.classList.remove('show'); localStorage.setItem('pwa-banner-closed', Date.now()); });
  window.addEventListener('appinstalled', ()=>{ banner.classList.remove('show'); localStorage.setItem('pwa-installed','1'); });

  const isInstalled=!!localStorage.getItem('pwa-installed');
  const isStandalone=window.matchMedia('(display-mode:standalone)').matches||window.navigator.standalone;
  const closedAt=parseInt(localStorage.getItem('pwa-banner-closed')||'0');
  const recentlyClosed=Date.now()-closedAt<86400000;
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);

  if(!isInstalled&&!isStandalone&&!recentlyClosed&&!isIOS){
    setTimeout(()=>banner.classList.add('show'), 3000);
  }
  if(isIOS&&!isStandalone&&!localStorage.getItem('ios-hint-shown')){
    setTimeout(()=>{
      const hint=document.createElement('div');
      hint.style.cssText='position:fixed;bottom:80px;left:16px;right:16px;background:#1C1C1E;color:#fff;border-radius:16px;padding:16px 18px;z-index:9999;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:13px;line-height:1.7;box-shadow:0 8px 30px rgba(0,0,0,0.5)';
      hint.innerHTML='<div style="font-size:16px;font-weight:700;margin-bottom:6px">📱 홈화면에 추가 (iPhone/iPad)</div><div>① 하단 <strong style="color:#0A84FF">공유버튼(□↑)</strong> 탭</div><div>② <strong style="color:#0A84FF">"홈 화면에 추가"</strong> → 추가</div><button id="ios-close" style="position:absolute;top:12px;right:14px;background:none;border:none;color:rgba(255,255,255,0.6);font-size:20px;cursor:pointer">✕</button>';
      document.body.appendChild(hint);
      document.getElementById('ios-close').onclick=()=>{ hint.remove(); localStorage.setItem('ios-hint-shown','1'); };
      setTimeout(()=>hint.parentNode&&hint.remove(), 10000);
    }, 3000);
  }

  // ── 서비스워커 ──
  if('serviceWorker' in navigator){
    const sw=`const C='jyexpress-v4';self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));});`;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
  }
  </script>
</body>
